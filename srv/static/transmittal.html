<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manuscript Transmittal</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Martian+Mono:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500;600&family=Geist+Mono:wght@400;600&family=Geist:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Literata:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet">
<script>
(function() {
  var FONTS = { jetbrains: 1, martian: 1, plex: 1, geist: 1, literata: 1, 'ibm-serif': 1, 'source-serif': 1, newsreader: 1 };
  var LEGACY = { menlo: 'jetbrains', 'ibm-sans': 'geist' };
  try {
    var t = JSON.parse(localStorage.getItem('prodcal-theme-v1'));
    if (t) {
      if (t.dark) document.documentElement.classList.add('dark');
      var f = LEGACY[t.font] || t.font;
      if (f && FONTS[f]) document.documentElement.setAttribute('data-font', f);
    }
  } catch(e) {}
})();
</script>
<link rel="stylesheet" href="theme.css?v=20260705a">
<link rel="stylesheet" href="style.css?v=20260705a">
<link rel="stylesheet" href="transmittal.css?v=20260705a">
</head>
<body>
<div id="app"></div>
<script src="theme.js?v=20260705a"></script>
<script src="transmittal.js?v=20260705a"></script>
</body>
</html>
