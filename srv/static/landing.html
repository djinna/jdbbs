<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JDBB Production</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0e17;
    color: #fffffe;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    max-width: 480px;
    padding: 40px 24px;
  }
  .logo {
    font-size: 48px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    font-size: 15px;
    color: #a7a9be;
    margin-bottom: 32px;
    line-height: 1.5;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }
  .links a {
    display: inline-block;
    padding: 12px 32px;
    background: #6c63ff;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 15px;
    transition: background 0.2s;
    width: 240px;
  }
  .links a:hover { background: #5a52e0; }
  .links a.secondary {
    background: transparent;
    border: 1px solid #333;
    color: #a7a9be;
  }
  .links a.secondary:hover { border-color: #6c63ff; color: #fff; }
  .footer {
    margin-top: 48px;
    font-size: 12px;
    color: #555;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">📚</div>
  <h1>JDBB Production</h1>
  <p class="subtitle">
    Book production calendars &amp; manuscript transmittals.
    <br>Shared project tracking for authors, editors, and production teams.
  </p>
  <div class="links">
    <a href="/admin/">Admin Dashboard →</a>
    <a href="/vgr/aog/" class="secondary">Art of Gig Project</a>
  </div>
  <div class="footer">&copy; 2025 JDBB</div>
</div>
</body>
</html>
