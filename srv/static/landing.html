<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jdbb studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;0,7..72,700;1,7..72,400&display=swap" rel="stylesheet">
<script>
(function() {
  try {
    var t = JSON.parse(localStorage.getItem('prodcal-theme-v1'));
    if (t && t.dark) document.documentElement.classList.add('dark');
  } catch(e) {}
})();
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f8f9fa; --surface: #ffffff; --border: #e0e2e6;
  --text: #111827; --text-secondary: #6b7280; --text-muted: #9ca3af;
  --accent: #2563eb;
  --noise-opacity: 0.035; --grid-color: rgba(160,168,180,0.6);
  --gradient-wash: linear-gradient(to bottom, rgba(230,233,240,0.3) 0%, transparent 60%);
  --progress-bg: #f1f3f5;
  --theme-bg: rgba(255,255,255,0.92);
}

html.dark {
  --bg: #0f1115; --surface: #1a1d24; --border: #2a2d35;
  --text: #e4e5e7; --text-secondary: #9ca0a8; --text-muted: #6b7074;
  --accent: #5b9aff;
  --noise-opacity: 0.012; --grid-color: rgba(90,96,110,0.7);
  --gradient-wash: linear-gradient(to bottom, rgba(20,22,28,0.4) 0%, transparent 60%);
  --progress-bg: #23262e;
  --theme-bg: rgba(26,29,36,0.92);
}

body {
  background: var(--bg);
  font-family: 'IBM Plex Serif', Georgia, serif;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: background 0.3s, color 0.3s;
}
body, body * { font-weight: 400; }

/* Noise texture overlay */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px; opacity: var(--noise-opacity);
}

/* Gradient wash at top */
body::after {
  content: ''; position: fixed; top: 0; left: 0; right: 0; height: 50vh; z-index: 0;
  pointer-events: none; background: var(--gradient-wash);
}

/* Dashed grid lines */
.grid-lines { position: fixed; inset: 0; z-index: 0; pointer-events: none; display: flex; justify-content: center; }
.grid-lines-inner { width: 1120px; max-width: 100vw; display: flex; justify-content: space-between; padding: 0; }
.grid-line {
  width: 1px;
  background: repeating-linear-gradient(to bottom, var(--grid-color) 0px, var(--grid-color) 4px, transparent 4px, transparent 10px);
}

/* Theme bar — matches dashboard exactly */
.theme-bar {
  position: fixed; top: 1rem; right: 2rem; z-index: 200;
  display: flex; align-items: center; gap: 0.25rem;
  background: var(--theme-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: 14px;
  padding: 0.2rem 0.3rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  transition: background 0.3s, border-color 0.3s;
}

.theme-bar .font-options {
  display: flex; gap: 0.15rem; overflow: hidden;
  max-width: 0; opacity: 0;
  transition: max-width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
}
.theme-bar.expanded .font-options {
  max-width: 400px; opacity: 1;
}

.theme-bar .font-name {
  padding: 0.25rem 0.5rem; font-size: 0.65rem; color: var(--text-secondary);
  cursor: pointer; white-space: nowrap; transition: color 0.15s;
  border-radius: 10px;
}
.theme-bar .font-name:hover { color: var(--text); }
.theme-bar.expanded .font-name { display: none; }

.theme-opt {
  padding: 0.25rem 0.5rem; border-radius: 10px; border: none;
  background: transparent; color: var(--text-secondary); font-size: 0.65rem;
  cursor: pointer; white-space: nowrap; transition: all 0.15s;
  font-family: inherit;
}
.theme-opt:hover { color: var(--text); background: var(--progress-bg); }
.theme-opt.active { color: var(--accent); background: rgba(37,99,235,0.08); }
html.dark .theme-opt.active { background: rgba(91,154,255,0.12); }

.theme-sep {
  width: 1px; height: 13px; background: var(--border);
  margin: 0 0.1rem; flex-shrink: 0; align-self: center;
}

.dark-btn {
  width: 20px; height: 20px; padding: 0; border-radius: 50%; border: none;
  background: transparent; color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.dark-btn:hover { color: var(--text); background: var(--progress-bg); }

/* Main content */
.container {
  position: relative; z-index: 1;
  text-align: center;
  max-width: 520px;
  padding: 40px 24px;
}

.logo {
  font-size: 48px;
  margin-bottom: 1.5rem;
  line-height: 1;
}

h1 {
  font-family: inherit;
  font-size: 1.75rem;
  font-weight: 600;
  letter-spacing: -0.03em;
  color: var(--text);
  margin-bottom: 0.75rem;
}

.subtitle {
  font-size: 0.92rem;
  color: var(--text-secondary);
  line-height: 1.65;
  margin-bottom: 2.5rem;
}

.actions {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  align-items: center;
}

.btn {
  display: inline-block;
  padding: 0.65rem 2rem;
  border-radius: 4px;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.15s;
  width: 260px;
  text-align: center;
  cursor: pointer;
  border: 1px solid transparent;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { opacity: 0.9; }

.btn-secondary {
  background: transparent;
  color: var(--text);
  border-color: var(--border);
}
.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.btn-note {
  display: block;
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 0.35rem;
  font-style: italic;
}

.footer {
  margin-top: 3.5rem;
  font-size: 0.72rem;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}

@media (max-width: 480px) {
  .btn { width: 100%; }
  .container { padding: 32px 20px; }
}
</style>
</head>
<body>

<div class="grid-lines"><div class="grid-lines-inner">
  <div class="grid-line"></div><div class="grid-line"></div>
</div></div>

<div class="theme-bar" id="theme-bar">
  <div class="font-name" id="font-name" title="Click to change typeface">IBM Plex Serif</div>
  <div class="font-options" id="font-options">
    <button class="theme-opt" data-font="literata">Literata</button>
    <button class="theme-opt" data-font="ibm-serif">IBM Plex Serif</button>
    <button class="theme-opt" data-font="menlo">Menlo</button>
    <button class="theme-opt" data-font="ibm-sans">IBM Plex Sans</button>
  </div>
  <div class="theme-sep"></div>
  <button class="dark-btn" id="dark-btn" title="Toggle dark mode">&#9790;</button>
</div>

<div class="container">
  <div class="logo">📚</div>
  <h1>jdbb studio</h1>
  <p class="subtitle">
    Book production calendars &amp; manuscript transmittals.<br>
    Shared project tracking for authors, editors, and production teams.
  </p>
  <div class="actions">
    <form id="portal-form" style="display:flex;flex-direction:column;gap:0.7rem;align-items:center;width:min(100%, 420px)">
      <div style="display:flex;gap:0.6rem;flex-wrap:wrap;justify-content:center;width:100%">
        <input id="client-slug" type="text" placeholder="Client code (e.g. vgr)" autocomplete="off" spellcheck="false" style="flex:1 1 180px;min-width:180px;padding:0.95rem 1rem;border:1px solid var(--border);border-radius:999px;background:var(--card);color:var(--text);font:inherit">
        <button type="submit" class="btn btn-primary">Client Portal &rarr;</button>
      </div>
      <span class="btn-note">Enter your client code to open your portal, then select your project.</span>
      <div id="portal-error" style="display:none;color:#b91c1c;font-size:0.82rem"></div>
    </form>
  </div>
  <div class="footer">
    <a href="https://jdbbs.exe.xyz/__exe.dev/login?redirect=/admin/" style="color:var(--text-muted);text-decoration:none;font-size:0.72rem">Admin</a>
    &nbsp;&middot;&nbsp; &copy; 2025 JDBB
  </div>
</div>

<script>
// ─── Font System (matches dashboard) ───
var fonts = {
  'ibm-serif': { family: "'IBM Plex Serif',Georgia,serif", label: 'IBM Plex Serif' },
  'ibm-sans':  { family: "'IBM Plex Sans',-apple-system,sans-serif", label: 'IBM Plex Sans' },
  literata:    { family: "'Literata',Georgia,serif", label: 'Literata' },
  menlo:       { family: "'Menlo','Consolas','Monaco',monospace", label: 'Menlo' },
};
var fontKeys = ['literata', 'ibm-serif', 'menlo', 'ibm-sans'];
var state = { font: fontKeys[Math.floor(Math.random() * fontKeys.length)], dark: false };
try {
  var saved = JSON.parse(localStorage.getItem('prodcal-theme-v1'));
  if (saved) state.dark = saved.dark;
} catch(e) {}

function applyState() {
  var f = fonts[state.font];
  if (f) {
    document.body.style.fontFamily = f.family;
    document.getElementById('font-name').textContent = f.label;
  }
  document.documentElement.classList.toggle('dark', state.dark);
  document.querySelectorAll('.theme-opt[data-font]').forEach(function(b) {
    b.classList.toggle('active', b.dataset.font === state.font);
  });
  document.getElementById('dark-btn').textContent = state.dark ? '\u2600' : '\u263e';
}

function saveState() {
  try { localStorage.setItem('prodcal-theme-v1', JSON.stringify({ dark: state.dark })); } catch(e) {}
}

function setFont(key) { state.font = key; applyState(); saveState(); }
function toggleDark() { state.dark = !state.dark; applyState(); saveState(); }

var bar = document.getElementById('theme-bar');
var nameEl = document.getElementById('font-name');
var expanded = false;

nameEl.addEventListener('click', function() {
  expanded = !expanded;
  bar.classList.toggle('expanded', expanded);
});

document.addEventListener('click', function(e) {
  if (expanded && !bar.contains(e.target)) {
    expanded = false;
    bar.classList.remove('expanded');
  }
});

document.querySelectorAll('.theme-opt[data-font]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    setFont(this.dataset.font);
    expanded = false;
    bar.classList.remove('expanded');
  });
});

document.getElementById('dark-btn').addEventListener('click', toggleDark);

var portalForm = document.getElementById('portal-form');
var clientSlugInput = document.getElementById('client-slug');
var portalError = document.getElementById('portal-error');

portalForm.addEventListener('submit', function(e) {
  e.preventDefault();
  var raw = (clientSlugInput.value || '').trim().toLowerCase();
  var slug = raw.replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  if (!slug) {
    portalError.textContent = 'Enter your client code.';
    portalError.style.display = 'block';
    clientSlugInput.focus();
    return;
  }
  portalError.style.display = 'none';
  window.location.href = absoluteURL('/' + slug + '/');
});

function absoluteURL(path) {
  return new URL(path, window.location.origin + '/').toString();
}

applyState();
</script>
</body>
</html>
