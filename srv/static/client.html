<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Client Portal</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Martian+Mono:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500;600&family=Geist+Mono:wght@400;600&family=Geist:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Literata:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet">
<script>
(function() {
  try {
    var t = JSON.parse(localStorage.getItem('prodcal-theme-v1'));
    if (t && t.dark) document.documentElement.classList.add('dark');
    var legacy = { menlo: 'jetbrains', 'ibm-sans': 'geist' };
    var f = t && t.font;
    if (legacy[f]) f = legacy[f];
    if (f === 'jetbrains' || f === 'martian' || f === 'plex' || f === 'geist' || f === 'literata' || f === 'ibm-serif' || f === 'source-serif' || f === 'newsreader') {
      document.documentElement.setAttribute('data-font', f);
    }
  } catch(e) {}
})();
</script>
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/style.css">
<style>
  /* Terminal Folio — client portal interior. Structure from rules + whitespace
     only: no cards, no boxes, zero radius, zero shadows. Tokens: theme.css. */

  body {
    font-family: var(--body); font-size: 15px; line-height: 1.5;
    color: var(--text); background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }

  .page { max-width: 1040px; margin: 0 auto; padding: 0 32px; }

  /* Guard against the legacy floating theme pill in style.css until it is
     re-tokened: the masthead theme bar is plain inline text. */
  .jdbb-masthead .theme-bar {
    position: relative; background: none; border: none; border-radius: 0;
    box-shadow: none; padding: 0; backdrop-filter: none; -webkit-backdrop-filter: none;
  }
  .jdbb-masthead .theme-bar .font-name { font-size: 12px; border-radius: 0; }
  .jdbb-masthead .theme-bar .font-options { max-width: none; opacity: 1; overflow: visible; }
  .jdbb-masthead .theme-bar .theme-opt { background: none; border-radius: 0; }
  .jdbb-masthead .theme-bar .theme-opt.active { background: none; color: var(--accent); }
  .jdbb-masthead .theme-bar .dark-btn { width: auto; height: auto; border-radius: 0; background: none; font-size: 14px; }

  .site-footer {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 1rem; font-family: var(--mono); font-size: 12px; color: var(--text-muted);
    padding: 20px 0; margin-top: 80px;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .site-footer a { color: var(--text-muted); text-decoration: underline; text-underline-offset: 3px; }
  .site-footer a:hover { color: var(--text); }

  /* ---- Title block ---- */
  .dashboard { padding-top: 8px; }
  .title-block { padding: 48px 0 40px; }
  .title-block h1 {
    font-family: var(--mono); font-size: 32px; font-weight: 600;
    letter-spacing: -0.015em; line-height: 1.1; margin: 14px 0 10px;
  }
  .title-sub { font-size: 14px; color: var(--text-secondary); }

  /* ---- Stats: one ledger line between strong rules ---- */
  .stats-ledger {
    display: grid; grid-template-columns: repeat(4, auto);
    justify-content: space-between; gap: 16px 32px; padding: 18px 0;
  }
  .stat { display: flex; align-items: baseline; gap: 12px; white-space: nowrap; }
  .stat .stat-label {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted);
  }
  .stat .stat-value {
    font-family: var(--mono); font-size: 17px; font-weight: 600;
    letter-spacing: -0.01em; color: var(--text);
  }

  /* ---- Section heads ---- */
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 1rem; padding: 56px 0 10px; flex-wrap: wrap;
  }
  .section-head .count { color: var(--text-muted); font-weight: 400; }
  .section-actions { display: flex; align-items: baseline; gap: 24px; }

  /* ---- Project ledger blocks ---- */
  .projects-ledger .project { padding: 30px 0 34px; border-top: 1px solid var(--border); }
  .projects-ledger .project:first-child { border-top: 0; }
  .project-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 24px; margin-bottom: 18px; flex-wrap: wrap;
  }
  .project-name {
    font-family: var(--mono); font-size: 21px; font-weight: 600;
    letter-spacing: -0.01em; margin: 0;
  }
  .project-meta {
    font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.06em;
    color: var(--text-muted); text-transform: uppercase; white-space: nowrap;
  }
  .project-status {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 24px; font-family: var(--mono); font-size: 13px; margin-bottom: 10px;
  }
  .project-status .prompt { color: var(--text-muted); margin-right: 8px; }
  .project-status .pct { font-weight: 600; white-space: nowrap; }
  .project-tags { display: flex; align-items: baseline; gap: 16px; }
  .progress-line { margin-bottom: 18px; }
  .progress-line > span.done { background: var(--green); }
  .project-actions { display: flex; align-items: baseline; gap: 28px; flex-wrap: wrap; }
  .project-actions .link-action, .email-btn {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .email-btn {
    background: none; border: none; border-radius: 0; padding: 0; cursor: pointer;
    color: var(--text); text-decoration: underline; text-underline-offset: 3px;
    text-decoration-color: var(--text-muted);
  }
  .email-btn:hover { text-decoration-color: var(--text); }

  .empty { font-family: var(--mono); font-size: 13px; color: var(--text-muted); padding: 32px 0; }

  /* ---- Activity ledger ---- */
  .activity-tabs { display: flex; align-items: baseline; gap: 20px; }
  .activity-tab {
    background: none; border: none; border-radius: 0; padding: 0; cursor: pointer;
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted);
  }
  .activity-tab:hover { color: var(--text); }
  .activity-tab.active {
    color: var(--accent); text-decoration: underline; text-underline-offset: 4px;
  }
  .activity-row {
    display: grid; grid-template-columns: 110px 1fr auto;
    column-gap: 28px; padding: 13px 0; border-top: 1px solid var(--border);
    font-size: 14px; align-items: baseline;
  }
  .activity-row:first-child { border-top: 0; }
  .activity-time {
    font-family: var(--mono); font-size: 12px; color: var(--text-muted);
    letter-spacing: 0.02em; white-space: nowrap;
  }
  .activity-event .proj { font-family: var(--mono); font-size: 13px; font-weight: 600; }
  .activity-event .fine { color: var(--text-secondary); }
  .activity-event .note { color: var(--text-secondary); margin-top: 2px; }
  .activity-event .fine-line { color: var(--text-muted); font-family: var(--mono); font-size: 11px; margin-top: 2px; }
  .activity-tag { text-align: right; }

  /* ---- Auth / error: centered rule-bounded blocks ---- */
  .auth-box {
    max-width: 420px; margin: 96px auto 0; padding: 40px 4px 44px;
    border-top: 1px solid var(--border-strong);
    border-bottom: 1px solid var(--border-strong);
  }
  .auth-box h2 {
    font-family: var(--mono); font-size: 20px; font-weight: 600;
    letter-spacing: -0.01em; margin: 14px 0 8px;
  }
  .auth-box .auth-sub { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
  .auth-box .auth-sub code { font-family: var(--mono); color: var(--accent); }
  .auth-box .input-bare { margin-bottom: 20px; }
  .auth-box .error {
    font-family: var(--mono); font-size: 12px; color: var(--red); margin-top: 14px;
  }
  .auth-box .forgot-link { margin-top: 26px; }
  .auth-box .back-link { margin-top: 12px; }

  /* ---- Modals: --surface + 1px strong rule, no radius, no shadow ---- */
  .overlay {
    position: fixed; inset: 0; background: var(--modal-backdrop);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 16px;
  }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border-strong);
    padding: 28px; width: min(92vw, 500px); max-height: 85vh; overflow-y: auto;
  }
  .modal-box h2 {
    font-family: var(--mono); font-size: 16px; font-weight: 600;
    letter-spacing: -0.01em; margin: 0 0 8px;
  }
  .modal-sub { color: var(--text-secondary); font-size: 14px; margin: 0 0 20px; }
  .modal-actions {
    display: flex; justify-content: flex-end; align-items: baseline;
    gap: 28px; margin-top: 24px;
  }
  .modal-actions .btn-fill[disabled], .modal-actions .link-action[disabled] {
    opacity: 0.5; cursor: default;
  }
  .field { display: grid; gap: 6px; margin-bottom: 16px; }
  .field-label {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted);
  }
  .field-hint { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }
  .form-error { font-family: var(--mono); font-size: 12px; color: var(--red); margin-top: 4px; }
  .callout {
    border-left: 2px solid var(--accent); padding: 6px 0 6px 12px;
    font-family: var(--mono); font-size: 12.5px; color: var(--text-secondary);
    margin-bottom: 16px;
  }
  .callout.ok { border-left-color: var(--green); color: var(--green); }
  .callout.err { border-left-color: var(--red); color: var(--red); }
  .recip-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .recip-row input[type="checkbox"] { accent-color: var(--accent); margin: 0; }
  .recip-row .recip-email { font-family: var(--mono); font-size: 13px; }
  .recip-row .recip-label {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted); margin-left: auto; white-space: nowrap;
  }
  .recip-row .input-bare { flex: 1; font-size: 13px; padding: 4px 2px; width: auto; }

  .loading-note {
    font-family: var(--mono); font-size: 13px; color: var(--text-muted);
    text-align: center; padding-top: 96px;
  }

  @media (max-width: 640px) {
    .page { padding: 0 16px; }
    .title-block { padding: 36px 0 28px; }
    .title-block h1 { font-size: 24px; }
    .stats-ledger { grid-template-columns: repeat(2, auto); }
    .section-head { padding-top: 40px; }
    .activity-row { grid-template-columns: 1fr auto; row-gap: 4px; }
    .activity-row .activity-event { grid-column: 1 / -1; }
    .auth-box { margin-top: 56px; }
    .jdbb-masthead { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="page">
  <header class="jdbb-masthead">
    <a class="jdbb-wordmark" href="/"><span class="bracket">[</span><span class="kj">j</span>dbb<span class="bracket">]</span><span class="studio">studio</span></a>
    <nav><div id="theme-bar"></div></nav>
  </header>
  <div class="jdbb-statusline">
    <span id="status-ctx">Client portal</span>
    <span>UTC <span id="status-date"></span> &middot; <span class="ok">&#9679;</span> live</span>
  </div>
  <div id="app"></div>
  <footer class="site-footer">
    <a class="jdbb-wordmark" href="https://www.djinna.com" rel="noopener"><span class="bracket">[</span><span class="kj">j</span>dbb<span class="bracket">]</span></a>
    <span><a href="/admin/">Admin</a> &middot; &copy; 2026 Jenna Dixon</span>
  </footer>
</div>
<script src="/static/theme.js"></script>
<script>
const $ = (s) => document.querySelector(s);
const api = async (url, opts = {}) => {
  const r = await fetch(url, { headers: {'Content-Type':'application/json', ...opts.headers}, ...opts });
  const text = await r.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch(e) {}
  if (!r.ok) { const err = new Error((data && data.error) || r.statusText || ('HTTP ' + r.status)); err.status = r.status; throw err; }
  if (!data) throw new Error('Expected JSON response from server');
  return data;
};
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function portalBaseURL() { return window.location.origin + '/'; }
function absoluteURL(path) { return new URL(path, portalBaseURL()).toString(); }

let contactEmail = 'j@djinna.com';
fetch('/api/public/config').then(r => r.ok ? r.json() : null).then(c => { if (c && c.contact_email) contactEmail = c.contact_email; }).catch(() => {});

// Shared chrome: theme/font bar + statusline date (state lives in theme.js).
JdbbTheme.mount(document.getElementById('theme-bar'));
document.getElementById('status-date').textContent = new Date().toISOString().slice(0, 10);

const clientSlug = window.location.pathname.replace(/\/+$/, '').split('/').filter(Boolean)[0];
let state = { view: 'loading', client: null, projects: [], error: '', activityTab: 'files', fileLog: [], journal: [], showDigestEmail: false, digestSending: false, digestResult: null, emailConfigured: null, showNewProject: false, projectCreate: { name: '', start_date: '', project_slug: '', error: '', saving: false } };

function slugifyProject(value) {
  return (value || '').toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

function render() {
  const app = $('#app');
  if (state.view === 'loading') {
    app.innerHTML = '<div class="dashboard"><div class="loading-note">Loading&hellip;</div></div>';
  } else if (state.view === 'auth') {
    app.innerHTML = '';
    const box = document.createElement('div');
    box.className = 'auth-box';
    box.innerHTML = `
      <div class="kicker">Client portal</div>
      <h2>Password required</h2>
      <p class="auth-sub">${esc(state.client?.name || clientSlug)}</p>
      <input type="password" id="pw" class="input-bare" placeholder="Password" autofocus>
      <div><button class="btn-fill" id="loginBtn" style="width:100%">Unlock</button></div>
      ${state.error ? '<div class="error">' + esc(state.error) + '</div>' : ''}
      <div class="forgot-link"><a href="#" id="forgotLink" class="link-action">Forgot or need a reset?</a></div>
      <div class="back-link"><a href="/" class="link-action">&larr; Back</a></div>
    `;
    app.appendChild(box);
    const pw = box.querySelector('#pw');
    const btn = box.querySelector('#loginBtn');
    const doLogin = async () => {
      try {
        await api('/api/clients/' + clientSlug + '/verify', {
          method: 'POST', body: JSON.stringify({ password: pw.value })
        });
        boot();
      } catch(e) { state.error = 'Invalid password'; render(); }
    };
    btn.addEventListener('click', doLogin);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    const forgotLink = box.querySelector('#forgotLink');
    if (forgotLink) {
      forgotLink.addEventListener('click', (e) => {
        e.preventDefault();
        const subject = encodeURIComponent('Portal access — ' + clientSlug);
        const body = encodeURIComponent(
          'Hi,\n\nI’d like a password reset (or password) for the JDBB client portal.\n\n' +
          'Client code: ' + clientSlug + '\n' +
          'Portal URL: ' + window.location.href + '\n\n' +
          'Thanks.\n'
        );
        window.location.href = 'mailto:' + contactEmail + '?subject=' + subject + '&body=' + body;
      });
    }
  } else if (state.view === 'notfound') {
    app.innerHTML = '';
    const box = document.createElement('div');
    box.className = 'auth-box';
    box.innerHTML = `
      <div class="kicker">Client portal</div>
      <h2>We don't recognize that client code</h2>
      <p class="auth-sub">There's no portal at <code>/${esc(clientSlug)}/</code>. Double-check the link or client code you were given &mdash; a small typo is the usual cause.</p>
      <div class="back-link"><a href="/" class="link-action">&larr; Back to start</a></div>
    `;
    app.appendChild(box);
  } else if (state.view === 'portal') {
    app.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'dashboard';
    const name = state.client?.name || clientSlug;
    document.getElementById('status-ctx').textContent = 'Client portal · ' + name;

    // Stats
    const totalTasks = state.projects.reduce((s, p) => s + p.task_count, 0);
    const totalDone = state.projects.reduce((s, p) => s + p.done_count, 0);
    const totalActive = state.projects.reduce((s, p) => s + p.active_count, 0);

    div.innerHTML = `
      <section class="title-block">
        <div class="kicker">Dashboard</div>
        <h1>${esc(name)}</h1>
        <p class="title-sub">${state.projects.length} project${state.projects.length !== 1 ? 's' : ''} in production</p>
      </section>
      <hr class="rule-strong">
      <div class="stats-ledger" id="stats"></div>
      <hr class="rule-strong">
      <div class="section-head">
        <span class="kicker">Projects <span class="count">&middot; ${state.projects.length}</span></span>
        <span class="section-actions">
          <button class="link-action" id="new-project-btn">+ New project</button>
          ${state.projects.length > 0 ? '<button class="link-action" id="digest-btn" title="Email a digest of the last 7 days">Email digest</button>' : ''}
        </span>
      </div>
      <hr class="rule">
      <div class="projects-ledger" id="projList"></div>
    `;
    app.appendChild(div);

    document.getElementById('new-project-btn').addEventListener('click', () => {
      state.showNewProject = true;
      state.projectCreate = { name: '', start_date: '', project_slug: '', error: '', saving: false };
      render();
    });
    const digestBtn = document.getElementById('digest-btn');
    if (digestBtn) digestBtn.addEventListener('click', () => { state.showDigestEmail = true; state.digestResult = null; render(); });

    // Stats ledger line
    const statsEl = div.querySelector('#stats');
    statsEl.innerHTML = `
      <div class="stat">
        <span class="stat-label">Projects</span>
        <span class="stat-value">${state.projects.length}</span>
      </div>
      <div class="stat">
        <span class="stat-label">Total tasks</span>
        <span class="stat-value">${totalTasks}</span>
      </div>
      <div class="stat">
        <span class="stat-label">Completed</span>
        <span class="stat-value" style="color:var(--green)">${totalDone}</span>
      </div>
      <div class="stat">
        <span class="stat-label">In progress</span>
        <span class="stat-value" style="color:var(--accent)">${totalActive}</span>
      </div>
    `;

    // Project ledger blocks
    const list = div.querySelector('#projList');
    if (state.projects.length === 0) {
      list.innerHTML = '<div class="empty">&gt; No projects yet.</div>';
    } else {
      list.innerHTML = state.projects.map(p => {
        const pct = p.task_count > 0 ? Math.round((p.done_count / p.task_count) * 100) : 0;
        const txTag = p.has_transmittal
          ? `<span class="tag">[${esc((p.transmittal_status || 'draft').toUpperCase())}]</span>` : '';
        const statusTag = pct === 100
          ? '<span class="tag ok">[COMPLETE]</span>'
          : (p.active_count > 0 ? '<span class="tag warn">[IN PROGRESS]</span>' : '<span class="tag">[SCHEDULED]</span>');
        const projectURL = absoluteURL(p.path);
        const transmittalURL = absoluteURL(p.path + 'transmittal/');
        return `
          <article class="project">
            <div class="project-head">
              <h2 class="project-name">${esc(p.name)}</h2>
              <span class="project-meta">Start ${esc(p.start_date || 'TBD')}</span>
            </div>
            <div class="project-status">
              <span><span class="prompt">&gt;</span>${p.done_count}/${p.task_count} tasks done${p.active_count > 0 ? ' &middot; ' + p.active_count + ' active' : ''}</span>
              <span class="project-tags">${txTag}${statusTag}<span class="pct" style="color:${pct === 100 ? 'var(--green)' : 'var(--text)'}">${pct}%</span></span>
            </div>
            <div class="progress-line"><span class="${pct === 100 ? 'done' : ''}" style="width:${pct}%"></span></div>
            <div class="project-actions">
              <a class="link-action" href="${esc(projectURL)}">Calendar &rarr;</a>
              <a class="link-action" href="${esc(transmittalURL)}">Transmittal</a>
              <button class="email-btn" data-email-project="${p.id}" data-email-name="${esc(p.name)}" data-email-type="snapshot">Snapshot</button>
              <button class="email-btn" data-email-project="${p.id}" data-email-name="${esc(p.name)}" data-email-type="activity">Activity</button>
            </div>
          </article>
        `;
      }).join('');
    }

    // Wire up per-project email buttons
    div.querySelectorAll('.email-btn[data-email-project]').forEach(btn => {
      btn.addEventListener('click', () => {
        openProjectEmailModal(parseInt(btn.dataset.emailProject), btn.dataset.emailName, btn.dataset.emailType);
      });
    });

    // Activity section
    const actDiv = document.createElement('div');
    actDiv.className = 'activity-section';
    actDiv.innerHTML = `
      <div class="section-head">
        <span class="kicker">Recent activity</span>
        <span class="activity-tabs">
          <button class="activity-tab ${state.activityTab === 'files' ? 'active' : ''}" data-tab="files">Files</button>
          <button class="activity-tab ${state.activityTab === 'journal' ? 'active' : ''}" data-tab="journal">Journal</button>
        </span>
      </div>
      <hr class="rule-strong">
      <div id="activity-content"></div>
    `;
    div.appendChild(actDiv);
    actDiv.querySelectorAll('.activity-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        state.activityTab = btn.dataset.tab;
        render();
      });
    });
    renderActivityContent(actDiv.querySelector('#activity-content'));

    // Digest email modal
    if (state.showDigestEmail) {
      renderDigestModal(div);
    }
    if (state.showNewProject) {
      renderNewProjectModal(div);
    }
  }
}

function renderNewProjectModal(root) {
  const backdrop = document.createElement('div');
  backdrop.className = 'overlay';
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop && !state.projectCreate.saving) {
      state.showNewProject = false;
      render();
    }
  });

  const modal = document.createElement('div');
  modal.className = 'modal-box';
  modal.innerHTML = `
    <h2>New project</h2>
    <p class="modal-sub">Create a fresh project in the ${esc(state.client?.name || clientSlug)} portal.</p>
    <label class="field">
      <span class="field-label">Project name</span>
      <input id="np-name" type="text" class="input-bare" value="${esc(state.projectCreate.name)}" placeholder="Spring 2026 novel">
    </label>
    <label class="field">
      <span class="field-label">Project code / slug</span>
      <input id="np-slug" type="text" class="input-bare" value="${esc(state.projectCreate.project_slug)}" placeholder="spring-2026-novel">
    </label>
    <label class="field">
      <span class="field-label">Start date (optional)</span>
      <input id="np-start" type="date" class="input-bare" value="${esc(state.projectCreate.start_date)}">
    </label>
    <div class="field-hint">Portal URL will be /${esc(clientSlug)}/<span id="np-preview">${esc(state.projectCreate.project_slug || 'project-slug')}</span>/</div>
    ${state.projectCreate.error ? `<div class="form-error">${esc(state.projectCreate.error)}</div>` : ''}
    <div class="modal-actions">
      <button id="np-cancel" class="link-action" ${state.projectCreate.saving ? 'disabled' : ''}>Cancel</button>
      <button id="np-create" class="btn-fill" ${state.projectCreate.saving ? 'disabled' : ''}>${state.projectCreate.saving ? 'Creating…' : 'Create project'}</button>
    </div>
  `;
  backdrop.appendChild(modal);
  root.appendChild(backdrop);

  const nameInput = modal.querySelector('#np-name');
  const slugInput = modal.querySelector('#np-slug');
  const startInput = modal.querySelector('#np-start');
  const preview = modal.querySelector('#np-preview');

  function syncPreview() {
    preview.textContent = slugInput.value.trim() || 'project-slug';
  }

  nameInput.addEventListener('input', () => {
    const nextName = nameInput.value;
    const auto = slugifyProject(nextName);
    const currentSlug = slugInput.value.trim();
    if (!currentSlug || currentSlug === slugifyProject(state.projectCreate.name)) {
      slugInput.value = auto;
    }
    state.projectCreate.name = nextName;
    state.projectCreate.project_slug = slugInput.value.trim();
    state.projectCreate.error = '';
    syncPreview();
  });
  slugInput.addEventListener('input', () => {
    slugInput.value = slugifyProject(slugInput.value);
    state.projectCreate.project_slug = slugInput.value.trim();
    state.projectCreate.error = '';
    syncPreview();
  });
  startInput.addEventListener('input', () => {
    state.projectCreate.start_date = startInput.value;
    state.projectCreate.error = '';
  });
  syncPreview();

  modal.querySelector('#np-cancel').addEventListener('click', () => {
    if (state.projectCreate.saving) return;
    state.showNewProject = false;
    render();
  });
  modal.querySelector('#np-create').addEventListener('click', createProjectFromPortal);
}

async function createProjectFromPortal() {
  state.projectCreate.name = state.projectCreate.name.trim();
  state.projectCreate.project_slug = slugifyProject(state.projectCreate.project_slug || state.projectCreate.name);
  if (!state.projectCreate.name) {
    state.projectCreate.error = 'Project name is required.';
    render();
    return;
  }
  if (!state.projectCreate.project_slug) {
    state.projectCreate.error = 'Project code is required.';
    render();
    return;
  }
  state.projectCreate.saving = true;
  state.projectCreate.error = '';
  render();
  try {
    await api('/api/clients/' + clientSlug + '/projects', {
      method: 'POST',
      body: JSON.stringify({
        name: state.projectCreate.name,
        start_date: state.projectCreate.start_date,
        project_slug: state.projectCreate.project_slug,
      })
    });
    state.showNewProject = false;
    state.projectCreate = { name: '', start_date: '', project_slug: '', error: '', saving: false };
    await boot();
  } catch (e) {
    state.projectCreate.saving = false;
    state.projectCreate.error = e.message || 'Create project failed';
    render();
  }
}

function renderActivityContent(container) {
  if (state.activityTab === 'files') {
    if (state.fileLog.length === 0) {
      container.innerHTML = '<div class="empty">&gt; No file transfers logged yet.</div>';
    } else {
      container.innerHTML = state.fileLog.map(e => {
        const dirLabel = e.direction === 'outbound' ? '[OUT]' : '[IN]';
        return `
          <div class="activity-row">
            <div class="activity-time">${esc(e.transfer_date || '')}</div>
            <div class="activity-event">
              <span class="proj">${esc(e.project_name)}</span> &middot; ${esc(e.filename || '—')}
              ${e.file_type ? '<span class="fine">(' + esc(e.file_type) + ')</span>' : ''}
              ${e.notes ? '<div class="note">' + esc(e.notes) + '</div>' : ''}
              <div class="fine-line">${esc(e.sent_by || '?')} &rarr; ${esc(e.received_by || '?')}</div>
            </div>
            <div class="activity-tag tag">${dirLabel}</div>
          </div>
        `;
      }).join('');
    }
  } else {
    if (state.journal.length === 0) {
      container.innerHTML = '<div class="empty">&gt; No journal entries yet.</div>';
    } else {
      const typeTagCls = { call: '', decision: 'warn', approval: 'ok', note: '' };
      container.innerHTML = state.journal.map(e => {
        const tagCls = typeTagCls[e.entry_type] || '';
        const dt = new Date(e.created_at);
        const dateStr = isNaN(dt) ? esc(e.created_at || '') : dt.toISOString().slice(0, 10);
        return `
          <div class="activity-row">
            <div class="activity-time">${dateStr}</div>
            <div class="activity-event">
              <span class="proj">${esc(e.project_name)}</span>
              <div style="margin-top:4px;white-space:pre-wrap">${esc(e.content)}</div>
            </div>
            <div class="activity-tag tag ${tagCls}">[${esc((e.entry_type || 'note').toUpperCase())}]</div>
          </div>
        `;
      }).join('');
    }
  }
}

// ─── Per-Project Email Modal ───
let projEmailState = { show: false, projectId: null, projectName: '', type: 'snapshot', sending: false, result: null };
let projEmailRecipients = null;

function initProjEmailRecipients() {
  if (projEmailRecipients) return;
  projEmailRecipients = [
    { email: 'jdbb@agentmail.to', label: 'JDBB Archive', checked: true, editable: false },
    { email: contactEmail, label: 'Studio', checked: true, editable: false },
    { email: '', label: 'Other', checked: false, editable: true },
  ];
}

function openProjectEmailModal(projectId, projectName, type) {
  projEmailState = { show: true, projectId, projectName, type, sending: false, result: null };
  projEmailRecipients = null;
  renderProjectEmailModal();
}

function closeProjectEmailModal() {
  projEmailState.show = false;
  const existing = document.querySelector('.proj-email-backdrop');
  if (existing) existing.remove();
}

async function sendProjectEmail() {
  initProjEmailRecipients();
  const recipients = projEmailRecipients
    .filter(r => r.checked && r.email.trim())
    .map(r => r.email.trim());
  if (recipients.length === 0) {
    projEmailState.result = { error: 'Select at least one recipient' };
    renderProjectEmailModal();
    return;
  }
  projEmailState.sending = true;
  projEmailState.result = null;
  renderProjectEmailModal();
  try {
    const endpoint = projEmailState.type === 'snapshot' ? 'snapshot/email' : 'activity/email';
    const res = await api('/api/projects/' + projEmailState.projectId + '/' + endpoint, {
      method: 'POST',
      body: JSON.stringify({ recipients }),
    });
    projEmailState.sending = false;
    projEmailState.result = { ok: true, sent_to: res.sent_to };
    renderProjectEmailModal();
  } catch (e) {
    projEmailState.sending = false;
    projEmailState.result = { error: e.message };
    renderProjectEmailModal();
  }
}

function renderProjectEmailModal() {
  initProjEmailRecipients();
  checkEmailConfig();

  let backdrop = document.querySelector('.proj-email-backdrop');
  if (!backdrop) {
    backdrop = document.createElement('div');
    backdrop.className = 'proj-email-backdrop overlay';
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeProjectEmailModal(); });
    document.body.appendChild(backdrop);
  }

  const typeLabel = projEmailState.type === 'snapshot' ? 'Project snapshot' : 'Activity update';
  const typeDesc = projEmailState.type === 'snapshot'
    ? 'Sends schedule, budget, transmittal, recent files, and journal.'
    : 'Sends file transfers and journal entries from the last 7 days.';

  const modal = document.createElement('div');
  modal.className = 'modal-box';

  let html = `<h2>${esc(typeLabel)}: ${esc(projEmailState.projectName)}</h2>`;
  html += `<p class="modal-sub">${typeDesc}</p>`;

  if (state.emailConfigured === false) {
    html += '<div class="callout">Email is not configured on the server.</div>';
  }

  html += '<div style="margin-bottom:16px"><div class="field-label" style="margin-bottom:10px">Send to</div>';
  projEmailRecipients.forEach((r, i) => {
    html += '<div class="recip-row">';
    html += `<input type="checkbox" data-pidx="${i}" ${r.checked ? 'checked' : ''}>`;
    if (r.editable) {
      html += `<input type="email" class="input-bare" placeholder="email@example.com" value="${esc(r.email)}" data-pedit="${i}">`;
    } else {
      html += `<span class="recip-email">${esc(r.email)}</span>`;
    }
    html += `<span class="recip-label">${esc(r.label)}</span>`;
    html += '</div>';
  });
  html += '</div>';

  if (projEmailState.result?.ok) {
    html += '<div class="callout ok">&#10003; Sent to: ' + projEmailState.result.sent_to.join(', ') + '</div>';
  }
  if (projEmailState.result?.error) {
    html += '<div class="callout err">' + esc(projEmailState.result.error) + '</div>';
  }

  html += '<div class="modal-actions">';
  if (projEmailState.result?.ok) {
    html += '<button class="btn-fill" id="proj-email-done">Done</button>';
  } else {
    html += '<button class="link-action" id="proj-email-cancel">Cancel</button>';
    const disabled = projEmailState.sending || state.emailConfigured === false ? ' disabled' : '';
    html += `<button class="btn-fill" id="proj-email-send"${disabled}>${projEmailState.sending ? 'Sending…' : 'Send'}</button>`;
  }
  html += '</div>';

  modal.innerHTML = html;
  backdrop.innerHTML = '';
  backdrop.appendChild(modal);

  // Wire events
  modal.querySelectorAll('input[data-pidx]').forEach(cb => {
    cb.addEventListener('change', () => {
      projEmailRecipients[parseInt(cb.dataset.pidx)].checked = cb.checked;
    });
  });
  modal.querySelectorAll('input[data-pedit]').forEach(inp => {
    inp.addEventListener('input', () => {
      const idx = parseInt(inp.dataset.pedit);
      projEmailRecipients[idx].email = inp.value;
      projEmailRecipients[idx].checked = inp.value.trim().length > 0;
      const cb = modal.querySelector(`input[data-pidx="${idx}"]`);
      if (cb) cb.checked = projEmailRecipients[idx].checked;
    });
  });
  const doneBtn = modal.querySelector('#proj-email-done');
  if (doneBtn) doneBtn.addEventListener('click', closeProjectEmailModal);
  const cancelBtn = modal.querySelector('#proj-email-cancel');
  if (cancelBtn) cancelBtn.addEventListener('click', closeProjectEmailModal);
  const sendBtn = modal.querySelector('#proj-email-send');
  if (sendBtn) sendBtn.addEventListener('click', sendProjectEmail);
}

// ─── Digest Email Modal ───
let digestRecipients = null;

function initDigestRecipients() {
  if (digestRecipients) return;
  digestRecipients = [
    { email: 'jdbb@agentmail.to', label: 'JDBB Archive', checked: true, editable: false },
    { email: contactEmail, label: 'Studio', checked: true, editable: false },
    { email: '', label: 'Other', checked: false, editable: true },
  ];
}

async function checkEmailConfig() {
  if (state.emailConfigured !== null) return;
  try {
    const r = await api('/api/email/status');
    state.emailConfigured = r.configured;
  } catch {
    state.emailConfigured = false;
  }
}

async function sendDigestEmail() {
  const recipients = digestRecipients
    .filter(r => r.checked && r.email.trim())
    .map(r => r.email.trim());
  if (recipients.length === 0) {
    state.digestResult = { error: 'Select at least one recipient' };
    render();
    return;
  }
  state.digestSending = true;
  state.digestResult = null;
  render();
  try {
    const res = await api('/api/clients/' + clientSlug + '/digest/email', {
      method: 'POST',
      body: JSON.stringify({ recipients }),
    });
    state.digestSending = false;
    state.digestResult = { ok: true, sent_to: res.sent_to };
    render();
  } catch (e) {
    state.digestSending = false;
    state.digestResult = { error: e.message };
    render();
  }
}

function renderDigestModal(parent) {
  initDigestRecipients();
  checkEmailConfig();

  // Remove existing modal if any
  const existing = parent.querySelector('.modal-backdrop');
  if (existing) existing.remove();

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop overlay';
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) { state.showDigestEmail = false; state.digestResult = null; render(); }
  });

  const modal = document.createElement('div');
  modal.className = 'modal-box';

  let html = '<h2>Email digest</h2>';
  html += '<p class="modal-sub">Sends a digest of file transfers and journal entries from the last 7 days across all projects.</p>';

  if (state.emailConfigured === false) {
    html += '<div class="callout">Email is not configured on the server.</div>';
  }

  html += '<div style="margin-bottom:16px"><div class="field-label" style="margin-bottom:10px">Send to</div>';
  digestRecipients.forEach((r, i) => {
    html += '<div class="recip-row">';
    html += `<input type="checkbox" data-idx="${i}" ${r.checked ? 'checked' : ''}>`;
    if (r.editable) {
      html += `<input type="email" class="input-bare" placeholder="email@example.com" value="${esc(r.email)}" data-edit-idx="${i}">`;
    } else {
      html += `<span class="recip-email">${esc(r.email)}</span>`;
    }
    html += `<span class="recip-label">${esc(r.label)}</span>`;
    html += '</div>';
  });
  html += '</div>';

  if (state.digestResult?.ok) {
    html += '<div class="callout ok">&#10003; Sent to: ' + state.digestResult.sent_to.join(', ') + '</div>';
  }
  if (state.digestResult?.error) {
    html += '<div class="callout err">' + esc(state.digestResult.error) + '</div>';
  }

  html += '<div class="modal-actions">';
  if (state.digestResult?.ok) {
    html += '<button class="btn-fill" id="digest-done">Done</button>';
  } else {
    html += '<button class="link-action" id="digest-cancel">Cancel</button>';
    const disabled = state.digestSending || state.emailConfigured === false ? ' disabled' : '';
    html += `<button class="btn-fill" id="digest-send"${disabled}>${state.digestSending ? 'Sending…' : 'Send digest'}</button>`;
  }
  html += '</div>';

  modal.innerHTML = html;
  backdrop.appendChild(modal);
  parent.appendChild(backdrop);

  // Wire up events
  modal.querySelectorAll('input[data-idx]').forEach(cb => {
    cb.addEventListener('change', () => {
      const idx = parseInt(cb.dataset.idx);
      digestRecipients[idx].checked = cb.checked;
    });
  });
  modal.querySelectorAll('input[data-edit-idx]').forEach(inp => {
    inp.addEventListener('input', () => {
      const idx = parseInt(inp.dataset.editIdx);
      digestRecipients[idx].email = inp.value;
      digestRecipients[idx].checked = inp.value.trim().length > 0;
      const cb = modal.querySelector(`input[data-idx="${idx}"]`);
      if (cb) cb.checked = digestRecipients[idx].checked;
    });
  });
  const closeModal = () => { state.showDigestEmail = false; state.digestResult = null; render(); };
  const doneBtn = modal.querySelector('#digest-done');
  if (doneBtn) doneBtn.addEventListener('click', closeModal);
  const cancelBtn = modal.querySelector('#digest-cancel');
  if (cancelBtn) cancelBtn.addEventListener('click', closeModal);
  const sendBtn = modal.querySelector('#digest-send');
  if (sendBtn) sendBtn.addEventListener('click', sendDigestEmail);
}

async function boot() {
  state = { view: 'loading', client: null, projects: [], error: '', activityTab: 'files', fileLog: [], journal: [], showDigestEmail: false, digestSending: false, digestResult: null, emailConfigured: state.emailConfigured };
  render();
  try {
    const info = await api('/api/clients/' + clientSlug);
    state.client = info;
    if (info.has_auth && !info.authenticated) {
      state.view = 'auth';
      render();
      return;
    }
    const projects = await api('/api/clients/' + clientSlug + '/projects');
    state.projects = projects;
    state.view = 'portal';
    document.title = (info.name || clientSlug) + ' — Projects';
    render();
    // Load activity data in background
    try { state.fileLog = await api('/api/clients/' + clientSlug + '/file-log'); } catch(e) { state.fileLog = []; }
    try { state.journal = await api('/api/clients/' + clientSlug + '/journal'); } catch(e) { state.journal = []; }
    render();
  } catch(e) {
    if (e.message === 'unauthorized') {
      state.view = 'auth';
      state.client = state.client || {};
    } else if (e.status === 404 || !state.client) {
      state.view = 'notfound';
      state.error = e.message;
    } else {
      state.view = 'portal';
      state.error = e.message;
    }
    render();
  }
}

boot();
</script>
</body>
</html>
