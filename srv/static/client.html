<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Client Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;0,7..72,700;1,7..72,400&display=swap" rel="stylesheet">
<script>
(function() {
  try {
    var t = JSON.parse(localStorage.getItem('prodcal-theme-v1'));
    if (t && t.dark) document.documentElement.classList.add('dark');
  } catch(e) {}
})();
</script>
<link rel="stylesheet" href="/static/style.css">
<style>
  .dashboard { max-width: 1000px; margin: 0 auto; padding: 2rem; }

  .dash-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border);
  }
  .dash-header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
  .dash-header .subtitle { color: var(--text-secondary); font-size: 14px; margin-top: 2px; }

  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem; margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.25rem;
  }
  .stat-card .label {
    font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 0.5rem;
  }
  .stat-card .value { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }

  .projects-grid { display: grid; gap: 1rem; }
  .project-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem; transition: border-color 0.2s;
  }
  .project-card:hover { border-color: var(--accent); }
  .project-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 1rem;
  }
  .project-name { font-size: 1.15rem; font-weight: 600; }
  .project-meta {
    display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.5rem;
  }
  .project-meta span { font-size: 0.8rem; color: var(--text-secondary); }
  .progress-bar {
    width: 100%; height: 6px; background: var(--badge-dim-bg);
    border-radius: 3px; overflow: hidden; margin-top: 0.75rem;
  }
  .progress-fill {
    height: 100%; border-radius: 3px; transition: width 0.3s ease;
  }
  .progress-fill.green { background: var(--green, #4ade80); }
  .progress-fill.yellow { background: var(--yellow, #facc15); }
  .progress-fill.accent { background: var(--accent); }
  .badge {
    display: inline-flex; align-items: center; gap: 0.35rem;
    padding: 0.25rem 0.6rem; border-radius: 9999px;
    font-size: 0.75rem; font-weight: 500;
  }
  .badge-dim { background: var(--badge-dim-bg); color: var(--text-secondary); }
  .email-btn {
    background: none; border: none; color: var(--accent, #6c63ff); cursor: pointer;
    font-size: 0.8rem; padding: 0; text-decoration: none; font-family: inherit;
  }
  .email-btn:hover { text-decoration: underline; }
  .links { display: flex; gap: 0.75rem; margin-top: 1rem; }
  .links a { font-size: 0.8rem; color: var(--accent); text-decoration: none; }
  .links a:hover { text-decoration: underline; }

  .auth-box {
    max-width: 400px; margin: 80px auto; text-align: center;
    padding: 40px 32px; background: var(--surface); border-radius: 16px;
    border: 1px solid var(--border);
  }
  .auth-box h2 { font-size: 1.4rem; margin-bottom: 4px; }
  .auth-box .auth-sub { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; }
  .auth-box input {
    margin: 0 0 12px; padding: 10px 14px; width: 100%; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px;
  }
  .auth-box .error { color: #ef4444; font-size: 13px; margin-top: 8px; }
  .auth-box .back-link { margin-top: 16px; }
  .auth-box .back-link a { color: var(--text-secondary); font-size: 13px; text-decoration: none; }

  .theme-toggle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--badge-dim-bg); color: var(--text-secondary); cursor: pointer;
    font-size: 11px; transition: all 0.15s; padding: 0; line-height: 1;
  }
  .theme-toggle:hover { background: var(--border); color: var(--text); }

  .theme-bar {
    position: fixed; top: 1rem; right: 2rem; z-index: 200;
    display: flex; align-items: center; gap: 0.25rem;
    background: var(--theme-bg, rgba(255,255,255,0.85)); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 0.2rem 0.3rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: background 0.3s, border-color 0.3s;
  }
  .theme-bar .font-options {
    display: flex; gap: 0.15rem; overflow: hidden;
    max-width: 0; opacity: 0;
    transition: max-width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
  }
  .theme-bar.expanded .font-options { max-width: 400px; opacity: 1; }
  .theme-bar .font-name {
    padding: 0.25rem 0.5rem; font-size: 0.55rem; color: var(--text-secondary);
    cursor: pointer; white-space: nowrap; transition: color 0.15s; border-radius: 10px;
  }
  .theme-bar .font-name:hover { color: var(--text); }
  .theme-bar.expanded .font-name { display: none; }
  .theme-opt {
    padding: 0.25rem 0.5rem; border-radius: 10px; border: none;
    background: transparent; color: var(--text-secondary); font-size: 0.55rem;
    cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: inherit;
  }
  .theme-opt:hover { color: var(--text); background: var(--progress-bg, rgba(0,0,0,0.04)); }
  .theme-opt.active { color: var(--accent); background: rgba(37,99,235,0.08); }
  html.dark .theme-opt.active { background: rgba(91,154,255,0.12); }
  .theme-sep { width: 1px; height: 13px; background: var(--border); margin: 0 0.1rem; flex-shrink: 0; align-self: center; }
  .dark-btn {
    width: 20px; height: 20px; padding: 0; border-radius: 50%; border: none;
    background: transparent; color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .dark-btn:hover { color: var(--text); background: var(--progress-bg, rgba(0,0,0,0.04)); }

  .empty { text-align: center; padding: 4rem; color: var(--text-secondary); }

  .activity-section {
    margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border);
  }
  .activity-section h2 {
    font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .activity-tabs {
    display: flex; gap: 0.5rem; margin-bottom: 1rem;
  }
  .activity-tab {
    padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-secondary); cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all 0.15s;
  }
  .activity-tab:hover { border-color: var(--accent); color: var(--text); }
  .activity-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .activity-item {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 6px; font-size: 13px;
  }
  .activity-item-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  }
  .activity-item-header .project-label {
    font-size: 11px; background: var(--badge-dim-bg); padding: 1px 8px;
    border-radius: 9999px; color: var(--text-secondary); font-weight: 500;
  }
  .activity-item-date { font-size: 11px; color: var(--text-secondary); margin-left: auto; }
  .file-dir-sm { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 9999px; }
  .dir-in-sm { background: rgba(74, 222, 128, 0.15); color: var(--green, #4ade80); }
  .dir-out-sm { background: rgba(96, 165, 250, 0.15); color: var(--blue, #60a5fa); }
  .journal-type-sm { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 9999px; }
  .jt-call { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
  .jt-decision { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
  .jt-approval { background: rgba(74, 222, 128, 0.15); color: var(--green, #4ade80); }
  .jt-note { background: var(--badge-dim-bg); color: var(--text-secondary); }
</style>
</head>
<body>
<div class="grid-lines"><div class="grid-lines-inner">
  <div class="grid-line"></div><div class="grid-line"></div>
</div></div>
<div id="app"></div>
<script>
const $ = (s) => document.querySelector(s);
const api = async (url, opts = {}) => {
  const r = await fetch(url, { headers: {'Content-Type':'application/json', ...opts.headers}, ...opts });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || r.statusText);
  return data;
};
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function portalBaseURL() { return window.location.origin + '/'; }
function absoluteURL(path) { return new URL(path, portalBaseURL()).toString(); }

function getTheme() { try { var t = JSON.parse(localStorage.getItem('prodcal-theme-v1')); return (t && t.dark) ? 'dark' : 'light'; } catch(e) { return 'light'; } }
function applyTheme(t) {
  document.documentElement.classList.toggle('dark', t === 'dark');
}
function toggleTheme() {
  const isDark = document.documentElement.classList.contains('dark');
  const next = isDark ? 'light' : 'dark';
  try { localStorage.setItem('prodcal-theme-v1', JSON.stringify({ dark: next === 'dark' })); } catch(e) {}
  applyTheme(next);
}
applyTheme(getTheme());

// Font + Theme bar system
var _fonts = {
  'ibm-serif': { family: "'IBM Plex Serif',Georgia,serif", label: 'IBM Plex Serif' },
  'ibm-sans':  { family: "'IBM Plex Sans',-apple-system,sans-serif", label: 'IBM Plex Sans' },
  literata:    { family: "'Literata',Georgia,serif", label: 'Literata' },
  menlo:       { family: "'Menlo','Consolas','Monaco',monospace", label: 'Menlo' },
};
var _fontKeys = ['literata', 'ibm-serif', 'menlo', 'ibm-sans'];
var _themeState = { font: _fontKeys[Math.floor(Math.random() * _fontKeys.length)], dark: document.documentElement.classList.contains('dark') };

function _applyThemeBar() {
  var f = _fonts[_themeState.font];
  if (f) {
    document.body.style.fontFamily = f.family;
    var nameEl = document.getElementById('font-name');
    if (nameEl) nameEl.textContent = f.label;
  }
  document.querySelectorAll('.theme-opt[data-font]').forEach(function(b) {
    b.classList.toggle('active', b.dataset.font === _themeState.font);
  });
  var darkBtn = document.getElementById('dark-btn');
  if (darkBtn) darkBtn.textContent = _themeState.dark ? '\u2600' : '\u263e';
}
function _ensureThemeBar() {
  if (document.getElementById('theme-bar')) return;
  var bar = document.createElement('div');
  bar.className = 'theme-bar'; bar.id = 'theme-bar';
  bar.innerHTML = '<div class="font-name" id="font-name" title="Click to change typeface">' + (_fonts[_themeState.font]?.label || '') + '</div>'
    + '<div class="font-options" id="font-options">'
    + '<button class="theme-opt" data-font="literata">Literata</button>'
    + '<button class="theme-opt" data-font="ibm-serif">IBM Plex Serif</button>'
    + '<button class="theme-opt" data-font="menlo">Menlo</button>'
    + '<button class="theme-opt" data-font="ibm-sans">IBM Plex Sans</button>'
    + '</div><div class="theme-sep"></div>'
    + '<button class="dark-btn" id="dark-btn" title="Toggle dark mode">\u263e</button>';
  document.body.appendChild(bar);
  var expanded = false;
  document.getElementById('font-name').addEventListener('click', function() { expanded = !expanded; bar.classList.toggle('expanded', expanded); });
  document.addEventListener('click', function(e) { if (expanded && !bar.contains(e.target)) { expanded = false; bar.classList.remove('expanded'); } });
  bar.querySelectorAll('.theme-opt[data-font]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      _themeState.font = this.dataset.font; _applyThemeBar();
      expanded = false; bar.classList.remove('expanded');
    });
  });
  document.getElementById('dark-btn').addEventListener('click', function() {
    _themeState.dark = !_themeState.dark;
    document.documentElement.classList.toggle('dark', _themeState.dark);
    try { localStorage.setItem('prodcal-theme-v1', JSON.stringify({ dark: _themeState.dark })); } catch(e) {}
    _applyThemeBar();
  });
  _applyThemeBar();
}

const clientSlug = window.location.pathname.replace(/\/+$/, '').split('/').filter(Boolean)[0];
let state = { view: 'loading', client: null, projects: [], error: '', activityTab: 'files', fileLog: [], journal: [], showDigestEmail: false, digestSending: false, digestResult: null, emailConfigured: null, showNewProject: false, projectCreate: { name: '', start_date: '', project_slug: '', error: '', saving: false } };

function slugifyProject(value) {
  return (value || '').toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

function render() {
  const app = $('#app');
  if (state.view === 'loading') {
    app.innerHTML = '<div class="dashboard" style="text-align:center;padding-top:80px;color:var(--text-secondary)">Loading…</div>';
  } else if (state.view === 'auth') {
    app.innerHTML = '';
    const box = document.createElement('div');
    box.className = 'auth-box';
    box.innerHTML = `
      <h2>Password Required</h2>
      <p class="auth-sub">${esc(state.client?.name || clientSlug)}</p>
      <input type="password" id="pw" placeholder="Enter password" autofocus>
      <div><button class="btn btn-primary" id="loginBtn" style="width:100%">Unlock</button></div>
      ${state.error ? '<div class="error">' + esc(state.error) + '</div>' : ''}
      <div class="back-link"><a href="https://jdbbs.exe.xyz/">← Back</a></div>
    `;
    app.appendChild(box);
    const pw = box.querySelector('#pw');
    const btn = box.querySelector('#loginBtn');
    const doLogin = async () => {
      try {
        await api('/api/clients/' + clientSlug + '/verify', {
          method: 'POST', body: JSON.stringify({ password: pw.value })
        });
        boot();
      } catch(e) { state.error = 'Invalid password'; render(); }
    };
    btn.addEventListener('click', doLogin);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  } else if (state.view === 'portal') {
    app.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'dashboard';
    const name = state.client?.name || clientSlug;

    // Stats
    const totalTasks = state.projects.reduce((s, p) => s + p.task_count, 0);
    const totalDone = state.projects.reduce((s, p) => s + p.done_count, 0);
    const totalActive = state.projects.reduce((s, p) => s + p.active_count, 0);
    const withTx = state.projects.filter(p => p.has_transmittal).length;

    div.innerHTML = `
      <div class="dash-header">
        <div>
          <h1>${esc(name)}</h1>
          <div class="subtitle">${state.projects.length} project${state.projects.length !== 1 ? 's' : ''}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-sm" id="new-project-btn" style="font-size:12px">New Project</button>
          <button class="btn btn-sm" id="digest-btn" style="font-size:12px" title="Email weekly digest">Weekly Digest</button>
        </div>
      </div>
      <div class="stats-row" id="stats"></div>
      <div class="projects-grid" id="projList"></div>
    `;
    app.appendChild(div);

    // Apply theme + inject theme bar
    applyTheme(getTheme());
    _ensureThemeBar();
    document.getElementById('new-project-btn').addEventListener('click', () => {
      state.showNewProject = true;
      state.projectCreate = { name: '', start_date: '', project_slug: '', error: '', saving: false };
      render();
    });
    document.getElementById('digest-btn').addEventListener('click', () => { state.showDigestEmail = true; state.digestResult = null; render(); });

    // Stats cards
    const statsEl = div.querySelector('#stats');
    statsEl.innerHTML = `
      <div class="stat-card">
        <div class="label">Projects</div>
        <div class="value">${state.projects.length}</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Tasks</div>
        <div class="value">${totalTasks}</div>
      </div>
      <div class="stat-card">
        <div class="label">Completed</div>
        <div class="value">${totalDone}</div>
      </div>
      <div class="stat-card">
        <div class="label">In Progress</div>
        <div class="value">${totalActive}</div>
      </div>
    `;

    // Project cards
    const list = div.querySelector('#projList');
    if (state.projects.length === 0) {
      list.innerHTML = '<div class="empty">No projects yet.</div>';
    } else {
      list.innerHTML = state.projects.map(p => {
        const pct = p.task_count > 0 ? Math.round((p.done_count / p.task_count) * 100) : 0;
        const barClass = pct === 100 ? 'green' : pct > 50 ? 'accent' : 'yellow';
        const txBadge = p.has_transmittal
          ? `<span class="badge badge-dim">${esc(p.transmittal_status || 'draft')}</span>` : '';
        const projectURL = absoluteURL(p.path);
        const transmittalURL = absoluteURL(p.path + 'transmittal/');
        return `
          <div class="project-card">
            <div class="project-top">
              <div>
                <div class="project-name">${esc(p.name)}</div>
              </div>
              <div style="display:flex;gap:0.5rem">${txBadge}</div>
            </div>
            <div class="project-meta">
              <span>Start: ${esc(p.start_date || 'TBD')}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:0.85rem">
                <strong>${p.done_count}</strong>/${p.task_count} tasks done
                ${p.active_count > 0 ? '· <span style="color:var(--yellow, #facc15)">' + p.active_count + ' active</span>' : ''}
              </span>
              <span style="font-size:0.85rem;font-weight:600;color:${pct===100?'var(--green, #4ade80)':'var(--text)'}">${pct}%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill ${barClass}" style="width:${pct}%"></div>
            </div>
            <div class="links">
              <a href="${esc(projectURL)}">Calendar</a>
              <a href="${esc(transmittalURL)}">Transmittal</a>
              <button class="email-btn" data-email-project="${p.id}" data-email-name="${esc(p.name)}" data-email-type="snapshot">Snapshot</button>
              <button class="email-btn" data-email-project="${p.id}" data-email-name="${esc(p.name)}" data-email-type="activity">Activity</button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Wire up per-project email buttons
    div.querySelectorAll('.email-btn[data-email-project]').forEach(btn => {
      btn.addEventListener('click', () => {
        openProjectEmailModal(parseInt(btn.dataset.emailProject), btn.dataset.emailName, btn.dataset.emailType);
      });
    });

    // Activity section
    const actDiv = document.createElement('div');
    actDiv.className = 'activity-section';
    actDiv.innerHTML = `
      <h2>Recent Activity</h2>
      <div class="activity-tabs">
        <button class="activity-tab ${state.activityTab === 'files' ? 'active' : ''}" data-tab="files">Files</button>
        <button class="activity-tab ${state.activityTab === 'journal' ? 'active' : ''}" data-tab="journal">Journal</button>
      </div>
      <div id="activity-content"></div>
    `;
    div.appendChild(actDiv);
    actDiv.querySelectorAll('.activity-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        state.activityTab = btn.dataset.tab;
        render();
      });
    });
    renderActivityContent(actDiv.querySelector('#activity-content'));

    // Digest email modal
    if (state.showDigestEmail) {
      renderDigestModal(div);
    }
    if (state.showNewProject) {
      renderNewProjectModal(div);
    }
  }
}

function renderNewProjectModal(root) {
  const backdrop = document.createElement('div');
  backdrop.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;';
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop && !state.projectCreate.saving) {
      state.showNewProject = false;
      render();
    }
  });

  const modal = document.createElement('div');
  modal.style.cssText = 'width:min(92vw,520px);background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.25);';
  modal.innerHTML = `
    <h2 style="margin:0 0 6px;font-size:1.25rem">New Project</h2>
    <p style="margin:0 0 18px;color:var(--text-secondary);font-size:14px">Create a fresh project in the ${esc(state.client?.name || clientSlug)} portal.</p>
    <div style="display:grid;gap:12px">
      <label style="display:grid;gap:6px;font-size:13px;color:var(--text-secondary)">
        <span>Project name</span>
        <input id="np-name" type="text" value="${esc(state.projectCreate.name)}" placeholder="Spring 2026 novel" style="padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font:inherit">
      </label>
      <label style="display:grid;gap:6px;font-size:13px;color:var(--text-secondary)">
        <span>Project code / slug</span>
        <input id="np-slug" type="text" value="${esc(state.projectCreate.project_slug)}" placeholder="spring-2026-novel" style="padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font:inherit">
      </label>
      <label style="display:grid;gap:6px;font-size:13px;color:var(--text-secondary)">
        <span>Start date (optional)</span>
        <input id="np-start" type="date" value="${esc(state.projectCreate.start_date)}" style="padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font:inherit">
      </label>
      <div style="font-size:12px;color:var(--text-secondary)">Portal URL will be /${esc(clientSlug)}/<span id="np-preview">${esc(state.projectCreate.project_slug || 'project-slug')}</span>/</div>
      ${state.projectCreate.error ? `<div style="font-size:13px;color:#ef4444">${esc(state.projectCreate.error)}</div>` : ''}
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px">
      <button id="np-cancel" class="btn btn-sm btn-secondary" ${state.projectCreate.saving ? 'disabled' : ''}>Cancel</button>
      <button id="np-create" class="btn btn-sm" ${state.projectCreate.saving ? 'disabled' : ''}>${state.projectCreate.saving ? 'Creating…' : 'Create Project'}</button>
    </div>
  `;
  backdrop.appendChild(modal);
  root.appendChild(backdrop);

  const nameInput = modal.querySelector('#np-name');
  const slugInput = modal.querySelector('#np-slug');
  const startInput = modal.querySelector('#np-start');
  const preview = modal.querySelector('#np-preview');

  function syncPreview() {
    preview.textContent = slugInput.value.trim() || 'project-slug';
  }

  nameInput.addEventListener('input', () => {
    const nextName = nameInput.value;
    const auto = slugifyProject(nextName);
    const currentSlug = slugInput.value.trim();
    if (!currentSlug || currentSlug === slugifyProject(state.projectCreate.name)) {
      slugInput.value = auto;
    }
    state.projectCreate.name = nextName;
    state.projectCreate.project_slug = slugInput.value.trim();
    state.projectCreate.error = '';
    syncPreview();
  });
  slugInput.addEventListener('input', () => {
    slugInput.value = slugifyProject(slugInput.value);
    state.projectCreate.project_slug = slugInput.value.trim();
    state.projectCreate.error = '';
    syncPreview();
  });
  startInput.addEventListener('input', () => {
    state.projectCreate.start_date = startInput.value;
    state.projectCreate.error = '';
  });
  syncPreview();

  modal.querySelector('#np-cancel').addEventListener('click', () => {
    if (state.projectCreate.saving) return;
    state.showNewProject = false;
    render();
  });
  modal.querySelector('#np-create').addEventListener('click', createProjectFromPortal);
}

async function createProjectFromPortal() {
  state.projectCreate.name = state.projectCreate.name.trim();
  state.projectCreate.project_slug = slugifyProject(state.projectCreate.project_slug || state.projectCreate.name);
  if (!state.projectCreate.name) {
    state.projectCreate.error = 'Project name is required.';
    render();
    return;
  }
  if (!state.projectCreate.project_slug) {
    state.projectCreate.error = 'Project code is required.';
    render();
    return;
  }
  state.projectCreate.saving = true;
  state.projectCreate.error = '';
  render();
  try {
    await api('/api/clients/' + clientSlug + '/projects', {
      method: 'POST',
      body: JSON.stringify({
        name: state.projectCreate.name,
        start_date: state.projectCreate.start_date,
        project_slug: state.projectCreate.project_slug,
      })
    });
    state.showNewProject = false;
    state.projectCreate = { name: '', start_date: '', project_slug: '', error: '', saving: false };
    await boot();
  } catch (e) {
    state.projectCreate.saving = false;
    state.projectCreate.error = e.message || 'Create project failed';
    render();
  }
}

function renderActivityContent(container) {
  if (state.activityTab === 'files') {
    if (state.fileLog.length === 0) {
      container.innerHTML = '<div style="color:var(--text-secondary);font-size:13px;padding:1rem 0">No file transfers logged yet.</div>';
    } else {
      container.innerHTML = state.fileLog.map(e => {
        const dirCls = e.direction === 'outbound' ? 'dir-out-sm' : 'dir-in-sm';
        const dirLabel = e.direction === 'outbound' ? '↑ Out' : '↓ In';
        return `
          <div class="activity-item">
            <div class="activity-item-header">
              <span class="file-dir-sm ${dirCls}">${dirLabel}</span>
              <strong>${esc(e.filename || '—')}</strong>
              <span style="color:var(--text-secondary)">${esc(e.file_type || '')}</span>
              <span class="project-label">${esc(e.project_name)}</span>
              <span class="activity-item-date">${esc(e.transfer_date || '')}</span>
            </div>
            ${e.notes ? '<div style="color:var(--text-secondary);margin-top:2px">' + esc(e.notes) + '</div>' : ''}
            <div style="color:var(--text-secondary);font-size:11px;margin-top:2px">${esc(e.sent_by || '?')} → ${esc(e.received_by || '?')}</div>
          </div>
        `;
      }).join('');
    }
  } else {
    if (state.journal.length === 0) {
      container.innerHTML = '<div style="color:var(--text-secondary);font-size:13px;padding:1rem 0">No journal entries yet.</div>';
    } else {
      const typeEmoji = { call: '📞', decision: '⚖️', approval: '✅', note: '📝' };
      const typeCls = { call: 'jt-call', decision: 'jt-decision', approval: 'jt-approval', note: 'jt-note' };
      container.innerHTML = state.journal.map(e => {
        const emoji = typeEmoji[e.entry_type] || '📝';
        const cls = typeCls[e.entry_type] || 'jt-note';
        const label = e.entry_type.charAt(0).toUpperCase() + e.entry_type.slice(1);
        const dt = new Date(e.created_at);
        const dateStr = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        return `
          <div class="activity-item">
            <div class="activity-item-header">
              <span class="journal-type-sm ${cls}">${emoji} ${esc(label)}</span>
              <span class="project-label">${esc(e.project_name)}</span>
              <span class="activity-item-date">${dateStr}</span>
            </div>
            <div style="margin-top:4px;white-space:pre-wrap">${esc(e.content)}</div>
          </div>
        `;
      }).join('');
    }
  }
}

// ─── Per-Project Email Modal ───
let projEmailState = { show: false, projectId: null, projectName: '', type: 'snapshot', sending: false, result: null };
let projEmailRecipients = null;

function initProjEmailRecipients() {
  if (projEmailRecipients) return;
  projEmailRecipients = [
    { email: 'jdbb@agentmail.to', label: 'JDBB Archive', checked: true, editable: false },
    { email: 'j@djinna.com', label: 'Jenna', checked: true, editable: false },
    { email: '', label: 'Other', checked: false, editable: true },
  ];
}

function openProjectEmailModal(projectId, projectName, type) {
  projEmailState = { show: true, projectId, projectName, type, sending: false, result: null };
  projEmailRecipients = null;
  renderProjectEmailModal();
}

function closeProjectEmailModal() {
  projEmailState.show = false;
  const existing = document.querySelector('.proj-email-backdrop');
  if (existing) existing.remove();
}

async function sendProjectEmail() {
  initProjEmailRecipients();
  const recipients = projEmailRecipients
    .filter(r => r.checked && r.email.trim())
    .map(r => r.email.trim());
  if (recipients.length === 0) {
    projEmailState.result = { error: 'Select at least one recipient' };
    renderProjectEmailModal();
    return;
  }
  projEmailState.sending = true;
  projEmailState.result = null;
  renderProjectEmailModal();
  try {
    const endpoint = projEmailState.type === 'snapshot' ? 'snapshot/email' : 'activity/email';
    const res = await api('/api/projects/' + projEmailState.projectId + '/' + endpoint, {
      method: 'POST',
      body: JSON.stringify({ recipients }),
    });
    projEmailState.sending = false;
    projEmailState.result = { ok: true, sent_to: res.sent_to };
    renderProjectEmailModal();
  } catch (e) {
    projEmailState.sending = false;
    projEmailState.result = { error: e.message };
    renderProjectEmailModal();
  }
}

function renderProjectEmailModal() {
  initProjEmailRecipients();
  checkEmailConfig();

  let backdrop = document.querySelector('.proj-email-backdrop');
  if (!backdrop) {
    backdrop = document.createElement('div');
    backdrop.className = 'proj-email-backdrop';
    backdrop.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;';
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeProjectEmailModal(); });
    document.body.appendChild(backdrop);
  }

  const typeLabel = projEmailState.type === 'snapshot' ? 'Project Snapshot' : 'Activity Update';
  const typeDesc = projEmailState.type === 'snapshot'
    ? 'Sends schedule, budget, transmittal, recent files, and journal.'
    : 'Sends file transfers and journal entries from the last 7 days.';

  const modal = document.createElement('div');
  modal.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:460px;width:90%;max-height:80vh;overflow-y:auto;';

  let html = `<h2 style="margin:0 0 8px;font-size:18px;">${esc(typeLabel)}: ${esc(projEmailState.projectName)}</h2>`;
  html += `<p style="color:var(--text-secondary);font-size:14px;margin:0 0 16px">${typeDesc}</p>`;

  if (state.emailConfigured === false) {
    html += '<div style="background:#fef3c7;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:#92400e">⚠️ Email is not configured on the server.</div>';
  }

  html += '<div style="margin-bottom:16px"><label style="font-weight:600;display:block;margin-bottom:8px">Send to:</label>';
  projEmailRecipients.forEach((r, i) => {
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
    html += `<input type="checkbox" data-pidx="${i}" ${r.checked ? 'checked' : ''}>`;
    if (r.editable) {
      html += `<input type="email" placeholder="email@example.com" value="${esc(r.email)}" data-pedit="${i}" style="flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:14px">`;
    } else {
      html += `<span style="font-size:14px">${esc(r.email)}</span>`;
    }
    html += `<span style="font-size:12px;color:var(--text-secondary)">${esc(r.label)}</span>`;
    html += '</div>';
  });
  html += '</div>';

  if (projEmailState.result?.ok) {
    html += '<div style="background:#d1fae5;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:#065f46">✓ Sent to: ' + projEmailState.result.sent_to.join(', ') + '</div>';
  }
  if (projEmailState.result?.error) {
    html += '<div style="background:#fef2f2;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:#dc2626">❌ ' + esc(projEmailState.result.error) + '</div>';
  }

  html += '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">';
  if (projEmailState.result?.ok) {
    html += '<button class="btn btn-primary" id="proj-email-done">✓ Done</button>';
  } else {
    html += '<button class="btn" id="proj-email-cancel">Cancel</button>';
    const disabled = projEmailState.sending || state.emailConfigured === false ? ' disabled' : '';
    html += `<button class="btn btn-primary" id="proj-email-send"${disabled}>${projEmailState.sending ? 'Sending…' : '📨 Send'}</button>`;
  }
  html += '</div>';

  modal.innerHTML = html;
  backdrop.innerHTML = '';
  backdrop.appendChild(modal);

  // Wire events
  modal.querySelectorAll('input[data-pidx]').forEach(cb => {
    cb.addEventListener('change', () => {
      projEmailRecipients[parseInt(cb.dataset.pidx)].checked = cb.checked;
    });
  });
  modal.querySelectorAll('input[data-pedit]').forEach(inp => {
    inp.addEventListener('input', () => {
      const idx = parseInt(inp.dataset.pedit);
      projEmailRecipients[idx].email = inp.value;
      projEmailRecipients[idx].checked = inp.value.trim().length > 0;
      const cb = modal.querySelector(`input[data-pidx="${idx}"]`);
      if (cb) cb.checked = projEmailRecipients[idx].checked;
    });
  });
  const doneBtn = modal.querySelector('#proj-email-done');
  if (doneBtn) doneBtn.addEventListener('click', closeProjectEmailModal);
  const cancelBtn = modal.querySelector('#proj-email-cancel');
  if (cancelBtn) cancelBtn.addEventListener('click', closeProjectEmailModal);
  const sendBtn = modal.querySelector('#proj-email-send');
  if (sendBtn) sendBtn.addEventListener('click', sendProjectEmail);
}

// ─── Digest Email Modal ───
const DIGEST_RECIPIENTS = [
  { email: 'jdbb@agentmail.to', label: 'JDBB Archive', checked: true, editable: false },
  { email: 'j@djinna.com', label: 'Jenna', checked: true, editable: false },
];
let digestRecipients = null;

function initDigestRecipients() {
  if (digestRecipients) return;
  digestRecipients = DIGEST_RECIPIENTS.map(r => ({ ...r }));
  digestRecipients.push({ email: '', label: 'Other', checked: false, editable: true });
}

async function checkEmailConfig() {
  if (state.emailConfigured !== null) return;
  try {
    const r = await api('/api/email/status');
    state.emailConfigured = r.configured;
  } catch {
    state.emailConfigured = false;
  }
}

async function sendDigestEmail() {
  const recipients = digestRecipients
    .filter(r => r.checked && r.email.trim())
    .map(r => r.email.trim());
  if (recipients.length === 0) {
    state.digestResult = { error: 'Select at least one recipient' };
    render();
    return;
  }
  state.digestSending = true;
  state.digestResult = null;
  render();
  try {
    const res = await api('/api/clients/' + clientSlug + '/digest/email', {
      method: 'POST',
      body: JSON.stringify({ recipients }),
    });
    state.digestSending = false;
    state.digestResult = { ok: true, sent_to: res.sent_to };
    render();
  } catch (e) {
    state.digestSending = false;
    state.digestResult = { error: e.message };
    render();
  }
}

function renderDigestModal(parent) {
  initDigestRecipients();
  checkEmailConfig();

  // Remove existing modal if any
  const existing = parent.querySelector('.modal-backdrop');
  if (existing) existing.remove();

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;';
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) { state.showDigestEmail = false; state.digestResult = null; render(); }
  });

  const modal = document.createElement('div');
  modal.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:460px;width:90%;max-height:80vh;overflow-y:auto;';

  let html = '<h2 style="margin:0 0 8px;font-size:18px;">Email Weekly Digest</h2>';
  html += '<p style="color:var(--text-secondary);font-size:14px;margin:0 0 16px">Sends a digest of file transfers and journal entries from the last 7 days across all projects.</p>';

  if (state.emailConfigured === false) {
    html += '<div style="background:#fef3c7;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:#92400e">⚠️ Email is not configured on the server.</div>';
  }

  html += '<div style="margin-bottom:16px"><label style="font-weight:600;display:block;margin-bottom:8px">Send to:</label>';
  digestRecipients.forEach((r, i) => {
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
    html += `<input type="checkbox" data-idx="${i}" ${r.checked ? 'checked' : ''}>`;
    if (r.editable) {
      html += `<input type="email" placeholder="email@example.com" value="${esc(r.email)}" data-edit-idx="${i}" style="flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:14px">`;
    } else {
      html += `<span style="font-size:14px">${esc(r.email)}</span>`;
    }
    html += `<span style="font-size:12px;color:var(--text-secondary)">${esc(r.label)}</span>`;
    html += '</div>';
  });
  html += '</div>';

  if (state.digestResult?.ok) {
    html += '<div style="background:#d1fae5;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:#065f46">✓ Sent to: ' + state.digestResult.sent_to.join(', ') + '</div>';
  }
  if (state.digestResult?.error) {
    html += '<div style="background:#fef2f2;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:#dc2626">❌ ' + esc(state.digestResult.error) + '</div>';
  }

  html += '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">';
  if (state.digestResult?.ok) {
    html += '<button class="btn btn-primary" id="digest-done">✓ Done</button>';
  } else {
    html += '<button class="btn" id="digest-cancel">Cancel</button>';
    const disabled = state.digestSending || state.emailConfigured === false ? ' disabled' : '';
    html += `<button class="btn btn-primary" id="digest-send"${disabled}>${state.digestSending ? 'Sending…' : '📨 Send Digest'}</button>`;
  }
  html += '</div>';

  modal.innerHTML = html;
  backdrop.appendChild(modal);
  parent.appendChild(backdrop);

  // Wire up events
  modal.querySelectorAll('input[data-idx]').forEach(cb => {
    cb.addEventListener('change', () => {
      const idx = parseInt(cb.dataset.idx);
      digestRecipients[idx].checked = cb.checked;
    });
  });
  modal.querySelectorAll('input[data-edit-idx]').forEach(inp => {
    inp.addEventListener('input', () => {
      const idx = parseInt(inp.dataset.editIdx);
      digestRecipients[idx].email = inp.value;
      digestRecipients[idx].checked = inp.value.trim().length > 0;
      const cb = modal.querySelector(`input[data-idx="${idx}"]`);
      if (cb) cb.checked = digestRecipients[idx].checked;
    });
  });
  const closeModal = () => { state.showDigestEmail = false; state.digestResult = null; render(); };
  const doneBtn = modal.querySelector('#digest-done');
  if (doneBtn) doneBtn.addEventListener('click', closeModal);
  const cancelBtn = modal.querySelector('#digest-cancel');
  if (cancelBtn) cancelBtn.addEventListener('click', closeModal);
  const sendBtn = modal.querySelector('#digest-send');
  if (sendBtn) sendBtn.addEventListener('click', sendDigestEmail);
}

async function boot() {
  state = { view: 'loading', client: null, projects: [], error: '', activityTab: 'files', fileLog: [], journal: [], showDigestEmail: false, digestSending: false, digestResult: null, emailConfigured: state.emailConfigured };
  render();
  try {
    const info = await api('/api/clients/' + clientSlug);
    state.client = info;
    if (info.has_auth && !info.authenticated) {
      state.view = 'auth';
      render();
      return;
    }
    const projects = await api('/api/clients/' + clientSlug + '/projects');
    state.projects = projects;
    state.view = 'portal';
    document.title = (info.name || clientSlug) + ' — Projects';
    render();
    // Load activity data in background
    try { state.fileLog = await api('/api/clients/' + clientSlug + '/file-log'); } catch(e) { state.fileLog = []; }
    try { state.journal = await api('/api/clients/' + clientSlug + '/journal'); } catch(e) { state.journal = []; }
    render();
  } catch(e) {
    if (e.message === 'unauthorized') {
      state.view = 'auth';
      state.client = state.client || {};
    } else {
      state.view = 'portal';
      state.error = e.message;
    }
    render();
  }
}

boot();
</script>
