<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — ProdCal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --surface: #f8f9fa;
  --surface2: #f1f3f5;
  --border: #e5e7eb;
  --text: #111827;
  --text-dim: #6b7280;
  --accent: #2563eb;
  --green: #16a34a;
  --yellow: #ca8a04;
  --red: #dc2626;
  --orange: #ea580c;
}
[data-theme="dark"] {
  --bg: #111111;
  --surface: #1a1a1a;
  --surface2: #222222;
  --border: #2a2a2a;
  --text: #e4e6f0;
  --text-dim: #8b8fa8;
  --accent: #2563eb;
  --green: #4ade80;
  --yellow: #facc15;
  --red: #f87171;
  --orange: #fb923c;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Saira Condensed', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem 1.5rem;
  font-size: 17px;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
h1 {
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.header-right {
  display: flex;
  gap: 0.75rem;
  align-items: center;
}
.health-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.8rem;
  color: var(--text-dim);
  font-weight: 400;
}
.health-indicator {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.health-ok { background: var(--green); }
.health-err { background: var(--red); }
.theme-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 15px;
  transition: all 0.15s;
  padding: 0;
  line-height: 1;
}
.theme-toggle:hover { background: var(--surface2); color: var(--text); }

/* Badges */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.2rem 0.55rem;
  border-radius: 9999px;
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.01em;
}
.badge-green { background: rgba(22,163,74,0.08); color: var(--green); }
.badge-yellow { background: rgba(202,138,4,0.08); color: var(--yellow); }
.badge-red { background: rgba(220,38,38,0.08); color: var(--red); }
.badge-dim { background: var(--surface2); color: var(--text-dim); }
[data-theme="dark"] .badge-green { background: rgba(74,222,128,0.12); }
[data-theme="dark"] .badge-yellow { background: rgba(250,204,21,0.12); }
[data-theme="dark"] .badge-red { background: rgba(248,113,113,0.12); }

/* Status dot inside badge */
.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.status-dot.green { background: var(--green); }
.status-dot.yellow { background: var(--yellow); }
.status-dot.red { background: var(--red); }
.status-dot.dim { background: var(--text-dim); }

/* Stats */
.stats-row {
  display: flex;
  gap: 2rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}
.stat-card {
  flex: 1;
  min-width: 120px;
}
.stat-card .label {
  font-size: 0.75rem;
  color: var(--text-dim);
  font-weight: 400;
  margin-bottom: 0.25rem;
}
.stat-card .value {
  font-size: 2rem;
  font-weight: 600;
  letter-spacing: -0.02em;
}

/* Tabs */
.tab-bar {
  display: flex;
  gap: 0;
  margin-bottom: 2rem;
  border-bottom: 1px solid var(--border);
}
.tab-btn {
  padding: 0.6rem 1.25rem;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  color: var(--text-dim);
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Projects */
.projects-grid {
  display: grid;
  gap: 0.75rem;
}
.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.25rem 1.5rem;
  transition: border-color 0.2s;
}
.project-card:hover {
  border-color: var(--accent);
}
.project-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.75rem;
}
.project-name {
  font-size: 1.15rem;
  font-weight: 600;
}
.project-path {
  font-size: 0.78rem;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace;
  margin-top: 0.15rem;
}
.project-meta {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 0.75rem;
}
.project-meta span {
  font-size: 0.78rem;
  color: var(--text-dim);
}
.progress-bar {
  width: 100%;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 0.6rem;
}
.progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s ease;
}
.progress-fill.green { background: var(--green); }
.progress-fill.yellow { background: var(--yellow); }
.progress-fill.accent { background: var(--accent); }
.links {
  display: flex;
  gap: 1rem;
  margin-top: 0.75rem;
}
.links a, .links button.email-btn {
  font-size: 0.78rem;
  color: var(--accent);
  text-decoration: none;
}
.links a:hover, .links button.email-btn:hover {
  text-decoration: underline;
}
.email-btn {
  background: none;
  border: none;
  font-size: 0.78rem;
  color: var(--accent);
  cursor: pointer;
  padding: 0;
  font-family: inherit;
}
.email-btn:hover {
  text-decoration: underline;
}

#loading {
  text-align: center;
  padding: 4rem;
  color: var(--text-dim);
  font-size: 0.9rem;
}
.empty {
  text-align: center;
  padding: 4rem;
  color: var(--text-dim);
}

/* Books */
.upload-zone {
  border: 1.5px dashed var(--border);
  border-radius: 6px;
  padding: 2.5rem;
  text-align: center;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 1.5rem;
  font-size: 0.9rem;
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--accent);
  background: rgba(37,99,235,0.03);
  color: var(--text);
}
.upload-zone .icon {
  font-size: 1.5rem;
  margin-bottom: 0.5rem;
  color: var(--text-dim);
}
.upload-zone input[type="file"] { display: none; }
.book-form {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.book-form .full { grid-column: 1 / -1; }
.book-form label {
  display: block;
  font-size: 0.78rem;
  color: var(--text-dim);
  margin-bottom: 0.3rem;
  font-weight: 500;
}
.book-form input, .book-form select {
  width: 100%;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--text);
  font-size: 0.9rem;
  font-family: inherit;
}
.book-form input:focus, .book-form select:focus {
  outline: none;
  border-color: var(--accent);
}
.book-form .actions {
  display: flex;
  gap: 0.75rem;
  align-items: center;
}
.btn {
  padding: 0.45rem 1rem;
  border-radius: 4px;
  border: 1px solid var(--accent);
  background: var(--accent);
  color: #fff;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s;
  font-family: inherit;
}
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary {
  background: transparent;
  color: var(--text);
  border-color: var(--border);
}
.btn-secondary:hover { background: var(--surface2); }
.book-list {
  display: grid;
  gap: 0.5rem;
}
.book-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.85rem 1.25rem;
}
.book-row .book-info { flex: 1; }
.book-row .book-title { font-weight: 600; font-size: 1.05rem; }
.book-row .book-author { font-size: 0.82rem; color: var(--text-dim); }
.book-row .book-meta {
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-top: 0.2rem;
  font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace;
}
.book-row .book-actions { display: flex; gap: 0.4rem; align-items: center; }
.book-row .book-actions a, .book-row .book-actions button {
  font-size: 0.78rem;
  padding: 0.25rem 0.55rem;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  text-decoration: none;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.book-row .book-actions a:hover, .book-row .book-actions button:hover {
  background: var(--surface2);
}
.book-row .book-actions .dl-pdf { color: var(--green); border-color: var(--green); }
.book-row .book-actions .dl-epub { color: var(--accent); border-color: var(--accent); }

/* Modal */
.modal-backdrop {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
[data-theme="dark"] .modal-backdrop {
  background: rgba(0,0,0,0.6);
}
.modal-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 24px;
  max-width: 460px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-card h2 {
  margin: 0 0 6px;
  font-size: 1.05rem;
  font-weight: 600;
}
.modal-card p.subtitle {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin: 0 0 16px;
}
.modal-card .recipient-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.modal-card .recipient-row input[type="email"] {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--text);
  font-size: 0.85rem;
  font-family: inherit;
}
.modal-card .recipient-row input[type="email"]:focus {
  outline: none;
  border-color: var(--accent);
}
.modal-card .msg-ok {
  background: rgba(22,163,74,0.06);
  border: 1px solid rgba(22,163,74,0.15);
  border-radius: 4px;
  padding: 10px 12px;
  margin-bottom: 16px;
  font-size: 0.82rem;
  color: var(--green);
}
.modal-card .msg-err {
  background: rgba(220,38,38,0.06);
  border: 1px solid rgba(220,38,38,0.15);
  border-radius: 4px;
  padding: 10px 12px;
  margin-bottom: 16px;
  font-size: 0.82rem;
  color: var(--red);
}
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 16px;
}
.modal-actions button {
  padding: 7px 14px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-size: 0.85rem;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.modal-actions button:hover {
  background: var(--surface2);
}
.modal-actions button.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.modal-actions button.primary:hover {
  opacity: 0.9;
}
.modal-actions button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
/* Colophon */
.colophon {
  margin-top: 4rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  font-size: 0.78rem;
  color: var(--text-dim);
  line-height: 1.5;
}
.colophon a {
  color: var(--text-dim);
  text-decoration: underline;
  text-underline-offset: 2px;
}
.colophon a:hover {
  color: var(--text);
}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>ProdCal</h1>
  <div class="header-right">
    <span class="health-badge" id="health">
      <span class="health-indicator" id="health-dot"></span>
      checking…
    </span>
    <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode"></button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="projects">Projects</button>
  <button class="tab-btn" data-tab="books">Books</button>
</div>

<div id="tab-projects" class="tab-panel active">
  <div class="stats-row" id="stats"></div>
  <div id="loading">Loading…</div>
  <div class="projects-grid" id="projects"></div>
</div>

<div id="tab-books" class="tab-panel">
  <div class="upload-zone" id="upload-zone">
    <div class="icon">△</div>
    <div>Drop a Word file here or <strong>click to upload</strong></div>
    <div style="font-size:0.78rem;margin-top:0.5rem;color:var(--text-dim)">.docx files only</div>
    <input type="file" id="book-file" accept=".docx,.doc">
  </div>
  <div class="book-form" id="book-form" style="display:none">
    <div>
      <label>Title</label>
      <input type="text" id="book-title" placeholder="Ghosts in Machines">
    </div>
    <div>
      <label>Author</label>
      <input type="text" id="book-author" placeholder="Author Name">
    </div>
    <div>
      <label>Series</label>
      <select id="book-series">
        <option value="A Protocolized Anthology">Protocolized Anthology</option>
        <option value="">None</option>
      </select>
    </div>
    <div class="actions">
      <button class="btn" id="btn-upload" disabled>Upload &amp; Convert</button>
      <button class="btn btn-secondary" id="btn-cancel">Cancel</button>
      <span id="upload-status" style="font-size:0.82rem;color:var(--text-dim)"></span>
    </div>
  </div>
  <div id="book-list-loading" style="text-align:center;padding:2rem;color:var(--text-dim);font-size:0.9rem">Loading books…</div>
  <div class="book-list" id="book-list"></div>
</div>

<footer class="colophon">
  <p>Set in <a href="https://github.com/Omnibus-Type/Saira" target="_blank">Saira Condensed</a> by Héctor Gatti &amp; Omnibus-Type — a contemporary sans serif system designed for newspapers, magazines, books, and websites.</p>
</footer>

</div><!-- .container -->

<script>
// Theme toggle — shared localStorage key with calendar/transmittal
function getTheme() { return localStorage.getItem('prodcal-theme') || 'light'; }
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-toggle').textContent = t === 'dark' ? '\u2600' : '\u263E';
}
function toggleTheme() {
  const next = getTheme() === 'dark' ? 'light' : 'dark';
  localStorage.setItem('prodcal-theme', next);
  applyTheme(next);
}
applyTheme(getTheme());
document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

const $stats = document.getElementById('stats');
const $projects = document.getElementById('projects');
const $loading = document.getElementById('loading');
const $health = document.getElementById('health');
const $healthDot = document.getElementById('health-dot');

async function checkHealth() {
  try {
    const r = await fetch('/healthz');
    const d = await r.json();
    if (d.status === 'ok') {
      $healthDot.className = 'health-indicator health-ok';
      $health.innerHTML = '<span class="health-indicator health-ok"></span> Healthy';
      $health.className = 'health-badge';
    } else {
      throw new Error(d.detail);
    }
  } catch(e) {
    $healthDot.className = 'health-indicator health-err';
    $health.innerHTML = '<span class="health-indicator health-err"></span> Unhealthy';
    $health.className = 'health-badge';
  }
}

async function loadProjects() {
  try {
    const r = await fetch('/api/admin/projects');
    if (r.status === 403) {
      $loading.innerHTML = 'Forbidden \u2014 exe.dev login required. <a href="/" style="color:var(--accent)">Go to home</a>';
      return;
    }
    const projects = await r.json();
    $loading.style.display = 'none';
    renderStats(projects);
    renderProjects(projects);
  } catch(e) {
    $loading.textContent = 'Error loading projects: ' + e.message;
  }
}

function renderStats(projects) {
  const totalTasks = projects.reduce((s, p) => s + p.task_count, 0);
  const totalDone = projects.reduce((s, p) => s + p.done_count, 0);
  const totalActive = projects.reduce((s, p) => s + p.active_count, 0);
  const withTransmittal = projects.filter(p => p.has_transmittal).length;

  $stats.innerHTML = `
    <div class="stat-card">
      <div class="label">Projects</div>
      <div class="value">${projects.length}</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Tasks</div>
      <div class="value">${totalTasks}</div>
    </div>
    <div class="stat-card">
      <div class="label">Completed</div>
      <div class="value">${totalDone}</div>
    </div>
    <div class="stat-card">
      <div class="label">In Progress</div>
      <div class="value">${totalActive}</div>
    </div>
    <div class="stat-card">
      <div class="label">Transmittals</div>
      <div class="value">${withTransmittal}</div>
    </div>
  `;
}

function renderProjects(projects) {
  if (!projects.length) {
    $projects.innerHTML = '<div class="empty">No projects yet.</div>';
    return;
  }

  $projects.innerHTML = projects.map(p => {
    const pct = p.task_count > 0 ? Math.round((p.done_count / p.task_count) * 100) : 0;
    const barClass = pct === 100 ? 'green' : pct > 50 ? 'accent' : 'yellow';
    const authBadge = p.has_auth
      ? '<span class="badge badge-green"><span class="status-dot green"></span> Protected</span>'
      : '<span class="badge badge-red"><span class="status-dot red"></span> No auth</span>';
    const transmittalBadge = p.has_transmittal
      ? `<span class="badge badge-dim"><span class="status-dot dim"></span> ${p.transmittal_status || 'draft'}</span>`
      : '';

    const created = new Date(p.created_at).toLocaleDateString();
    const updated = new Date(p.updated_at).toLocaleDateString();

    return `
      <div class="project-card">
        <div class="project-top">
          <div>
            <div class="project-name">${esc(p.name)}</div>
            <div class="project-path">${esc(p.path)}</div>
          </div>
          <div style="display:flex;gap:0.5rem">
            ${authBadge}
            ${transmittalBadge}
          </div>
        </div>
        <div class="project-meta">
          <span>Start: ${esc(p.start_date || 'N/A')}</span>
          <span>Created: ${created}</span>
          <span>Updated: ${updated}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:0.85rem">
            <strong>${p.done_count}</strong>/${p.task_count} tasks done
            ${p.active_count > 0 ? `\u00b7 <span style="color:var(--yellow)">${p.active_count} active</span>` : ''}
          </span>
          <span style="font-size:0.85rem;font-weight:600;color:${pct===100?'var(--green)':'var(--text)'}">${pct}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${barClass}" style="width:${pct}%"></div>
        </div>
        <div class="links">
          <a href="${esc(p.path)}" target="_blank">Calendar</a>
          <a href="${esc(p.path)}transmittal/" target="_blank">Transmittal</a>
          <button class="email-btn" onclick="openEmailModal(${p.id}, '${esc(p.name).replace(/'/g, "\\'") }', 'snapshot')">Snapshot</button>
          <button class="email-btn" onclick="openEmailModal(${p.id}, '${esc(p.name).replace(/'/g, "\\'") }', 'activity')">Activity</button>
        </div>
      </div>
    `;
  }).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── Email Modal ───
const EMAIL_RECIPIENTS = [
  { email: 'jdbb@agentmail.to', label: 'JDBB Archive', checked: true, editable: false },
  { email: 'j@djinna.com', label: 'Jenna', checked: true, editable: false },
];

let emailModalRecipients = null;
let emailModalState = { projectId: null, projectName: '', type: '', sending: false, result: null };

function initEmailRecipients() {
  emailModalRecipients = EMAIL_RECIPIENTS.map(r => ({ ...r }));
  emailModalRecipients.push({ email: '', label: 'Other', checked: false, editable: true });
}

function openEmailModal(projectId, projectName, type) {
  initEmailRecipients();
  emailModalState = { projectId, projectName, type, sending: false, result: null };
  renderEmailModal();
}

function closeEmailModal() {
  const existing = document.querySelector('.modal-backdrop');
  if (existing) existing.remove();
  emailModalState = { projectId: null, projectName: '', type: '', sending: false, result: null };
}

function renderEmailModal() {
  // Remove existing
  const existing = document.querySelector('.modal-backdrop');
  if (existing) existing.remove();

  const { projectId, projectName, type, sending, result } = emailModalState;
  const typeLabel = type === 'snapshot' ? 'Snapshot' : 'Activity Digest';

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeEmailModal(); });

  const modal = document.createElement('div');
  modal.className = 'modal-card';

  let html = `<h2>Email ${esc(typeLabel)}</h2>`;
  html += `<p class="subtitle">Project: <strong>${esc(projectName)}</strong></p>`;

  html += '<div style="margin-bottom:16px"><label style="font-weight:600;display:block;margin-bottom:8px">Send to:</label>';
  emailModalRecipients.forEach((r, i) => {
    html += '<div class="recipient-row">';
    html += `<input type="checkbox" data-idx="${i}" ${r.checked ? 'checked' : ''}>`;
    if (r.editable) {
      html += `<input type="email" placeholder="email@example.com" value="${esc(r.email)}" data-edit-idx="${i}">`;
    } else {
      html += `<span style="font-size:14px">${esc(r.email)}</span>`;
    }
    html += `<span style="font-size:12px;color:var(--text-dim)">${esc(r.label)}</span>`;
    html += '</div>';
  });
  html += '</div>';

  if (result?.ok) {
    html += `<div class="msg-ok">Sent to: ${result.sent_to.join(', ')}</div>`;
  }
  if (result?.error) {
    html += `<div class="msg-err">${esc(result.error)}</div>`;
  }

  html += '<div class="modal-actions">';
  if (result?.ok) {
    html += '<button class="primary" id="em-done">Done</button>';
  } else {
    html += '<button id="em-cancel">Cancel</button>';
    const disabled = sending ? ' disabled' : '';
    html += `<button class="primary" id="em-send"${disabled}>${sending ? 'Sending\u2026' : 'Send ' + esc(typeLabel)}</button>`;
  }
  html += '</div>';

  modal.innerHTML = html;
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);

  // Wire up events
  modal.querySelectorAll('input[data-idx]').forEach(cb => {
    cb.addEventListener('change', () => {
      emailModalRecipients[parseInt(cb.dataset.idx)].checked = cb.checked;
    });
  });
  modal.querySelectorAll('input[data-edit-idx]').forEach(inp => {
    inp.addEventListener('input', () => {
      const idx = parseInt(inp.dataset.editIdx);
      emailModalRecipients[idx].email = inp.value;
      emailModalRecipients[idx].checked = inp.value.trim().length > 0;
      const cb = modal.querySelector(`input[data-idx="${idx}"]`);
      if (cb) cb.checked = emailModalRecipients[idx].checked;
    });
  });
  const doneBtn = modal.querySelector('#em-done');
  if (doneBtn) doneBtn.addEventListener('click', closeEmailModal);
  const cancelBtn = modal.querySelector('#em-cancel');
  if (cancelBtn) cancelBtn.addEventListener('click', closeEmailModal);
  const sendBtn = modal.querySelector('#em-send');
  if (sendBtn) sendBtn.addEventListener('click', sendEmailFromModal);
}

async function sendEmailFromModal() {
  const recipients = emailModalRecipients
    .filter(r => r.checked && r.email.trim())
    .map(r => r.email.trim());
  if (recipients.length === 0) {
    emailModalState.result = { error: 'Select at least one recipient' };
    renderEmailModal();
    return;
  }
  emailModalState.sending = true;
  renderEmailModal();
  try {
    const { projectId, type } = emailModalState;
    const url = `/api/projects/${projectId}/${type}/email`;
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recipients }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      throw new Error(err.detail || err.error || 'Send failed');
    }
    const data = await r.json();
    emailModalState.sending = false;
    emailModalState.result = { ok: true, sent_to: data.sent_to || recipients };
    renderEmailModal();
  } catch(e) {
    emailModalState.sending = false;
    emailModalState.result = { error: e.message };
    renderEmailModal();
  }
}

// ─── Tabs ───
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'books') loadBooks();
  });
});

// ─── Books ───
const $uploadZone = document.getElementById('upload-zone');
const $bookFile = document.getElementById('book-file');
const $bookForm = document.getElementById('book-form');
const $bookTitle = document.getElementById('book-title');
const $bookAuthor = document.getElementById('book-author');
const $bookSeries = document.getElementById('book-series');
const $btnUpload = document.getElementById('btn-upload');
const $btnCancel = document.getElementById('btn-cancel');
const $uploadStatus = document.getElementById('upload-status');
const $bookList = document.getElementById('book-list');
const $bookListLoading = document.getElementById('book-list-loading');

let selectedFile = null;

$uploadZone.addEventListener('click', () => $bookFile.click());
$uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  $uploadZone.classList.add('dragover');
});
$uploadZone.addEventListener('dragleave', () => $uploadZone.classList.remove('dragover'));
$uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  $uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFileSelect(e.dataTransfer.files[0]);
});
$bookFile.addEventListener('change', () => {
  if ($bookFile.files.length) handleFileSelect($bookFile.files[0]);
});

function handleFileSelect(file) {
  if (!file.name.match(/\.docx?$/i)) {
    alert('Please select a .docx file');
    return;
  }
  selectedFile = file;
  $bookForm.style.display = 'grid';
  $uploadZone.innerHTML = `<div class="icon">\u2713</div><div><strong>${esc(file.name)}</strong> (${(file.size/1024).toFixed(0)} KB)</div>`;
  // Try to guess title from filename
  const name = file.name.replace(/\.docx?$/i, '').replace(/[-_]/g, ' ');
  if (!$bookTitle.value) $bookTitle.value = name;
  checkUploadReady();
}

$bookTitle.addEventListener('input', checkUploadReady);
$bookAuthor.addEventListener('input', checkUploadReady);

function checkUploadReady() {
  $btnUpload.disabled = !selectedFile || !$bookTitle.value.trim() || !$bookAuthor.value.trim();
}

$btnCancel.addEventListener('click', resetUploadForm);

function resetUploadForm() {
  selectedFile = null;
  $bookFile.value = '';
  $bookForm.style.display = 'none';
  $bookTitle.value = '';
  $bookAuthor.value = '';
  $uploadStatus.textContent = '';
  $btnUpload.disabled = true;
  $uploadZone.innerHTML = `<div class="icon">\u25B3</div><div>Drop a Word file here or <strong>click to upload</strong></div><div style="font-size:0.78rem;margin-top:0.5rem;color:var(--text-dim)">.docx files only</div><input type="file" id="book-file" accept=".docx,.doc">`;
  // Re-bind file input
  document.getElementById('book-file').addEventListener('change', function() {
    if (this.files.length) handleFileSelect(this.files[0]);
  });
}

$btnUpload.addEventListener('click', async () => {
  if (!selectedFile) return;
  $btnUpload.disabled = true;
  $uploadStatus.textContent = 'Uploading\u2026';

  const fd = new FormData();
  fd.append('file', selectedFile);
  fd.append('title', $bookTitle.value.trim());
  fd.append('author', $bookAuthor.value.trim());
  fd.append('series', $bookSeries.value);

  try {
    const r = await fetch('/api/books/upload', { method: 'POST', body: fd });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: r.statusText }));
      throw new Error(err.error || 'Upload failed');
    }
    const data = await r.json();
    $uploadStatus.textContent = 'Converting\u2026';

    // Trigger conversion
    await fetch(`/api/books/${data.id}/convert`, { method: 'POST' });
    $uploadStatus.textContent = 'Conversion started!';
    resetUploadForm();
    loadBooks();
    // Poll for completion
    pollBookStatus(data.id);
  } catch(e) {
    $uploadStatus.textContent = 'Error: ' + e.message;
    $btnUpload.disabled = false;
  }
});

function pollBookStatus(bookId) {
  const iv = setInterval(async () => {
    try {
      const r = await fetch('/api/books');
      const books = await r.json();
      const book = books.find(b => b.ID === bookId);
      if (!book || book.Status === 'ready' || book.Status === 'error') {
        clearInterval(iv);
        loadBooks();
      }
    } catch(e) {
      clearInterval(iv);
    }
  }, 2000);
}

async function loadBooks() {
  try {
    const r = await fetch('/api/books');
    const books = await r.json();
    $bookListLoading.style.display = 'none';
    renderBooks(books);
  } catch(e) {
    $bookListLoading.textContent = 'Error: ' + e.message;
  }
}

function renderBooks(books) {
  if (!books || !books.length) {
    $bookList.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-dim)">No books yet. Upload a Word file to get started.</div>';
    return;
  }
  $bookList.innerHTML = books.map(b => {
    const statusBadge = {
      'uploaded': '<span class="badge badge-dim"><span class="status-dot dim"></span> Uploaded</span>',
      'converting': '<span class="badge badge-yellow"><span class="status-dot yellow"></span> Converting\u2026</span>',
      'ready': '<span class="badge badge-green"><span class="status-dot green"></span> Ready</span>',
      'error': `<span class="badge badge-red" title="${esc(b.ErrorMsg || '')}"><span class="status-dot red"></span> Error</span>`,
    }[b.Status] || `<span class="badge badge-dim">${esc(b.Status)}</span>`;

    const ago = timeAgo(b.UpdatedAt);
    let actions = '';
    if (b.Status === 'ready') {
      actions += `<a href="/api/books/${b.ID}/download/pdf" class="dl-pdf">Download PDF</a>`;
    }
    if (b.Status === 'error') {
      actions += `<button onclick="retryConvert(${b.ID})">Retry</button>`;
    }
    if (b.Status === 'uploaded') {
      actions += `<button onclick="startConvert(${b.ID})">Convert</button>`;
    }
    actions += `<button onclick="deleteBook(${b.ID})" style="color:var(--red)">Delete</button>`;

    return `<div class="book-row">
      <div class="book-info">
        <div class="book-title">${esc(b.Title)}</div>
        <div class="book-author">${esc(b.Author)}${b.Series ? ' \u00b7 ' + esc(b.Series) : ''}</div>
        <div class="book-meta">${esc(b.SourceFilename)} \u00b7 ${ago}</div>
      </div>
      <div>${statusBadge}</div>
      <div class="book-actions">${actions}</div>
    </div>`;
  }).join('');
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

async function startConvert(id) {
  await fetch(`/api/books/${id}/convert`, { method: 'POST' });
  loadBooks();
  pollBookStatus(id);
}

async function retryConvert(id) {
  await fetch(`/api/books/${id}/convert`, { method: 'POST' });
  loadBooks();
  pollBookStatus(id);
}

async function deleteBook(id) {
  if (!confirm('Delete this book?')) return;
  await fetch(`/api/books/${id}`, { method: 'DELETE' });
  loadBooks();
}

checkHealth();
loadProjects();
// Refresh every 30s
setInterval(() => { checkHealth(); loadProjects(); }, 30000);
</script>
