name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install Python deps for typesetting scripts
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install python-docx pyyaml

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build
        run: go build -o jdbbs ./cmd/srv

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -count=1
